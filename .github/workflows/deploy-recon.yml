name: Deploy recon-app

on:
  push:
    branches: [main]
    paths:
      - 'recon-app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy and rebuild on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 213.199.45.213
          port: 22
          username: root
          password: ${{ secrets.SERVER_PASS }}
          script_stop: true
          script: |
            mkdir -p /root/recon-app/templates
            find /root/recon-app -name '*.py' -o -name '*.html' -o -name '*.txt' -o -name '*.yml' | xargs rm -f

      - name: Upload files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 213.199.45.213
          port: 22
          username: root
          password: ${{ secrets.SERVER_PASS }}
          source: "recon-app/"
          target: "/root/"

      - name: Rebuild container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 213.199.45.213
          port: 22
          username: root
          password: ${{ secrets.SERVER_PASS }}
          script_stop: true
          script: |
            cd /root/recon-app
            docker compose up -d --build
            docker compose ps
