name: Deploy recon-app

on:
  push:
    branches: [main]
    paths:
      - 'recon-app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD~1 for requirements diff check

      - name: Rsync files to server
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
        run: |
          # sshpass lets us use password auth without interactive prompt
          sudo apt-get install -y -q sshpass

          # rsync: only transfers changed files, skips DB and secrets
          sshpass -e rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude='fees.db' \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            recon-app/ root@213.199.45.213:/root/recon-app/

      - name: Restart or rebuild container
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
        run: |
          # Only rebuild the image when dependencies actually changed.
          # Otherwise a plain restart is ~10x faster.
          if git diff HEAD~1 HEAD -- recon-app/requirements.txt | grep -q .; then
            echo "requirements.txt changed — full rebuild"
            sshpass -e ssh -o StrictHostKeyChecking=no root@213.199.45.213 \
              "cd /root/recon-app && docker compose up -d --build && docker compose ps"
          else
            echo "Code-only change — restart to flush Jinja2/Python caches"
            sshpass -e ssh -o StrictHostKeyChecking=no root@213.199.45.213 \
              "docker restart recon-app-recon-1 && sleep 3 && docker ps --filter name=recon-app-recon-1 --format '{{.Names}} {{.Status}}'"
          fi
