name: Deploy recon-app

on:
  push:
    branches: [main]
    paths:
      - 'recon-app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Rsync files to server
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
        run: |
          sudo apt-get install -y -q sshpass
          sshpass -e rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude='fees.db' \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            recon-app/ root@213.199.45.213:/root/recon-app/

      - name: Inject secrets into server .env
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
          S_ADMIN_USER: ${{ secrets.ADMIN_USER }}
          S_ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
          S_CRM_USER: ${{ secrets.CRM_USER }}
          S_CRM_PASS: ${{ secrets.CRM_PASS }}
          S_RECON_PASS: ${{ secrets.RECON_PASS }}
          S_FEES_PASS: ${{ secrets.FEES_PASS }}
          S_FX_PASS: ${{ secrets.FX_PASS }}
          S_DEALIO_PASS: ${{ secrets.DEALIO_PASS }}
          S_FLASK_SECRET: ${{ secrets.FLASK_SECRET }}
          S_PRAXIS_PASS: ${{ secrets.PRAXIS_PASS }}
          S_FEES_PG_PASS: ${{ secrets.FEES_PG_PASS }}
          S_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # echo avoids printf format-string issues (e.g. % in passwords)
          echo "ADMIN_USER=$S_ADMIN_USER"       > /tmp/new_secrets.env
          echo "ADMIN_PASS=$S_ADMIN_PASS"      >> /tmp/new_secrets.env
          echo "CRM_USER=$S_CRM_USER"          >> /tmp/new_secrets.env
          echo "CRM_PASS=$S_CRM_PASS"          >> /tmp/new_secrets.env
          echo "RECON_PASS=$S_RECON_PASS"      >> /tmp/new_secrets.env
          echo "FEES_PASS=$S_FEES_PASS"        >> /tmp/new_secrets.env
          echo "FX_PASS=$S_FX_PASS"            >> /tmp/new_secrets.env
          echo "DEALIO_PASS=$S_DEALIO_PASS"    >> /tmp/new_secrets.env
          echo "FLASK_SECRET=$S_FLASK_SECRET"  >> /tmp/new_secrets.env
          echo "PRAXIS_PASS=$S_PRAXIS_PASS"    >> /tmp/new_secrets.env
          echo "FEES_PG_PASS=$S_FEES_PG_PASS"  >> /tmp/new_secrets.env
          echo "ANTHROPIC_API_KEY=$S_ANTHROPIC_API_KEY" >> /tmp/new_secrets.env
          sshpass -e scp -o StrictHostKeyChecking=no /tmp/new_secrets.env root@213.199.45.213:/tmp/new_secrets.env
          sshpass -e ssh -o StrictHostKeyChecking=no root@213.199.45.213 'sed -i "/^ADMIN_USER=/d;/^ADMIN_PASS=/d;/^CRM_USER=/d;/^CRM_PASS=/d;/^RECON_PASS=/d;/^FEES_PASS=/d;/^FX_PASS=/d;/^DEALIO_PASS=/d;/^FLASK_SECRET=/d;/^PRAXIS_PASS=/d;/^FEES_PG_PASS=/d;/^ANTHROPIC_API_KEY=/d" /root/recon-app/.env && cat /tmp/new_secrets.env >> /root/recon-app/.env && rm /tmp/new_secrets.env'

      - name: Restart or rebuild container
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
        run: |
          if git diff HEAD~1 HEAD -- recon-app/requirements.txt | grep -q .; then
            echo "requirements.txt changed — full rebuild"
            sshpass -e ssh -o StrictHostKeyChecking=no root@213.199.45.213 \
              "cd /root/recon-app && docker compose up -d --build && docker compose ps"
          else
            echo "Code-only change — force-recreate recon container"
            sshpass -e ssh -o StrictHostKeyChecking=no root@213.199.45.213 \
              "cd /root/recon-app && docker compose up -d --force-recreate recon && sleep 3 && docker compose ps"
          fi

      - name: Security check — verify all routes require authentication
        run: |
          BASE="https://recon.cmtrading.com"
          FAIL=0

          # Wait for app to be ready (up to 60s) before running checks
          echo "Waiting for app to come online..."
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$BASE/")
            if [ "$code" != "000" ] && [ "$code" != "502" ] && [ "$code" != "503" ]; then
              echo "App is ready (got $code after ${i}x2s)"
              break
            fi
            echo "  Attempt $i: got $code, waiting 2s..."
            sleep 2
          done

          # GET check: expects 401. 405 = POST-only route (method wrong, not unprotected) → also pass
          check() {
            local url="$BASE$1"
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url")
            if [ "$code" = "401" ] || [ "$code" = "405" ]; then
              echo "  PASS $1 → $code"
            elif [ "$code" = "000" ]; then
              echo "  WARN $1 → timeout/unreachable (skipping)"
            else
              echo "  FAIL $1 → $code (expected 401)"
              FAIL=1
            fi
          }

          # POST check: sends empty POST, expects 401
          check_post() {
            local url="$BASE$1"
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST --max-time 10 "$url")
            if [ "$code" = "401" ]; then
              echo "  PASS POST $1 → $code"
            elif [ "$code" = "000" ]; then
              echo "  WARN POST $1 → timeout/unreachable (skipping)"
            else
              echo "  FAIL POST $1 → $code (expected 401)"
              FAIL=1
            fi
          }

          echo "=== Auth gate check (no credentials) ==="
          # Recon auth — GET routes
          check "/"
          check "/clients"
          check "/clients/data?span=1m"
          check "/banks"
          check "/banks/upload"
          check "/recon/2026-01"
          check "/recon/2026-01/groups"
          check "/recon/2026-01/export"
          check "/recon/2026-01/bank-match"
          check "/recon/2026-01/praxis"
          check "/cid/12345"
          check "/client/12345"
          # Fees auth — GET routes
          check "/fees"
          check "/fees/upload"
          check "/fees/calculator"
          check "/fees/processor-map"
          check "/fees/prompts"
          # FX auth
          check "/fx"
          check "/fx/api/rates"
          # Admin auth — GET routes
          check "/fees/admin"
          check "/fees/admin/backup"
          # Admin auth — POST-only routes (GET returns 405, verify POST returns 401)
          check_post "/fees/mode"
          check_post "/fees/admin/snapshot/save"
          # Recon auth — POST-only routes
          check_post "/recon/2026-01/refresh"
          check_post "/banks/accounts/add"

          echo ""
          if [ "$FAIL" = "1" ]; then
            echo "SECURITY CHECK FAILED — one or more routes are unprotected!"
            exit 1
          else
            echo "All routes correctly return 401 without credentials."
          fi
