name: Deploy recon-app

on:
  push:
    branches: [main]
    paths:
      - 'recon-app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Rsync files to server
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
        run: |
          sudo apt-get install -y -q sshpass
          sshpass -e rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude='fees.db' \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            recon-app/ root@213.199.45.213:/root/recon-app/

      - name: Inject secrets into server .env
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no root@213.199.45.213 "touch /root/recon-app/.env && sed -i '/^ADMIN_USER=/d;/^ADMIN_PASS=/d;/^CRM_USER=/d;/^CRM_PASS=/d;/^RECON_PASS=/d;/^FEES_PASS=/d;/^FX_PASS=/d;/^DEALIO_PASS=/d;/^FLASK_SECRET=/d;/^PRAXIS_PASS=/d;/^FEES_PG_PASS=/d;/^ANTHROPIC_API_KEY=/d' /root/recon-app/.env && printf 'ADMIN_USER=${{ secrets.ADMIN_USER }}\nADMIN_PASS=${{ secrets.ADMIN_PASS }}\nCRM_USER=${{ secrets.CRM_USER }}\nCRM_PASS=${{ secrets.CRM_PASS }}\nRECON_PASS=${{ secrets.RECON_PASS }}\nFEES_PASS=${{ secrets.FEES_PASS }}\nFX_PASS=${{ secrets.FX_PASS }}\nDEALIO_PASS=${{ secrets.DEALIO_PASS }}\nFLASK_SECRET=${{ secrets.FLASK_SECRET }}\nPRAXIS_PASS=${{ secrets.PRAXIS_PASS }}\nFEES_PG_PASS=${{ secrets.FEES_PG_PASS }}\nANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}\n' >> /root/recon-app/.env"

      - name: Restart or rebuild container
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
        run: |
          if git diff HEAD~1 HEAD -- recon-app/requirements.txt | grep -q .; then
            echo "requirements.txt changed — full rebuild"
            sshpass -e ssh -o StrictHostKeyChecking=no root@213.199.45.213 \
              "cd /root/recon-app && docker compose up -d --build && docker compose ps"
          else
            echo "Code-only change — force-recreate recon container"
            sshpass -e ssh -o StrictHostKeyChecking=no root@213.199.45.213 \
              "cd /root/recon-app && docker compose up -d --force-recreate recon && sleep 3 && docker compose ps"
          fi
