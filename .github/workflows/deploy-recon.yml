name: Deploy recon-app

on:
  push:
    branches: [main]
    paths:
      - 'recon-app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD~1 for requirements diff check

      - name: Rsync files to server
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
        run: |
          # sshpass lets us use password auth without interactive prompt
          sudo apt-get install -y -q sshpass

          # rsync: only transfers changed files, skips DB and secrets
          sshpass -e rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude='fees.db' \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            recon-app/ root@213.199.45.213:/root/recon-app/

      - name: Inject all secrets into server .env
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
        run: |
          # All credentials are injected from GitHub Secrets — none are hardcoded in repo.
          # docker-compose.yml reads every credential from environment variables.
          sshpass -e ssh -o StrictHostKeyChecking=no root@213.199.45.213 \
            "touch /root/recon-app/.env && \
             sed -i '/^ADMIN_USER=/d;/^ADMIN_PASS=/d;/^CRM_PASS=/d;/^CRM_USER=/d;\
/^RECON_PASS=/d;/^FEES_PASS=/d;/^FX_PASS=/d;\
/^DEALIO_PASS=/d;/^FLASK_SECRET=/d;\
/^PRAXIS_PASS=/d;/^FEES_PG_PASS=/d;\
/^ANTHROPIC_API_KEY=/d' /root/recon-app/.env && \
             printf 'ADMIN_USER=${{ secrets.ADMIN_USER }}\n\
ADMIN_PASS=${{ secrets.ADMIN_PASS }}\n\
CRM_USER=${{ secrets.CRM_USER }}\n\
CRM_PASS=${{ secrets.CRM_PASS }}\n\
RECON_PASS=${{ secrets.RECON_PASS }}\n\
FEES_PASS=${{ secrets.FEES_PASS }}\n\
FX_PASS=${{ secrets.FX_PASS }}\n\
DEALIO_PASS=${{ secrets.DEALIO_PASS }}\n\
FLASK_SECRET=${{ secrets.FLASK_SECRET }}\n\
PRAXIS_PASS=${{ secrets.PRAXIS_PASS }}\n\
FEES_PG_PASS=${{ secrets.FEES_PG_PASS }}\n\
ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}\n' \
               >> /root/recon-app/.env"

      - name: Restart or rebuild container
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
        run: |
          # Only rebuild the image when dependencies actually changed.
          # Otherwise a plain restart is ~10x faster.
          if git diff HEAD~1 HEAD -- recon-app/requirements.txt | grep -q .; then
            echo "requirements.txt changed — full rebuild"
            sshpass -e ssh -o StrictHostKeyChecking=no root@213.199.45.213 \
              "cd /root/recon-app && docker compose up -d --build && docker compose ps"
          else
            echo "Code-only change — force-recreate to reload templates + flush caches"
            sshpass -e ssh -o StrictHostKeyChecking=no root@213.199.45.213 \
              "cd /root/recon-app && docker compose up -d --force-recreate recon && sleep 3 && docker compose ps"
          fi
