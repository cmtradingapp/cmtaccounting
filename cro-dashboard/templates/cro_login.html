<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CRO — Sign in</title>
<link rel="stylesheet" href="{{ url_for('static', filename='cro.css') }}">
<style>
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box  { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
                padding: 28px 30px; width: 340px; }
  .login-box h1 { margin: 0 0 6px; font-size: 18px; }
  .login-box p  { color: var(--text-dim); margin: 0 0 18px; font-size: 13px; }
  .login-box label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .login-box input[type=password] { width: 100%; }
  .login-box button { width: 100%; margin-top: 14px; padding: 10px; }
  .err { color: var(--neg); font-size: 12px; margin-top: 10px; }
</style>
</head>
<body>
<div class="login-wrap">
  <form class="login-box filters" method="post" action="{{ url_for('login_post') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
    <h1>CRO All in One</h1>
    <p>Dashboard access</p>
    <label for="pw">Password</label>
    <input id="pw" name="password" type="password" autofocus autocomplete="current-password">
    <button type="submit">Sign in</button>
    {% if err %}<div class="err">Invalid password.</div>{% endif %}
  </form>
</div>
</body>
</html>
