services:
  recon:
    build: .
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      - DEALIO_HOST=cmtrading-replicadb.dealio.ai
      - DEALIO_PORT=5106
      - DEALIO_DB=dealio
      - DEALIO_USER=dealio_rep
      - DEALIO_PASS=${DEALIO_PASS}
      - FLASK_SECRET=${FLASK_SECRET}
      - RECON_USER=${RECON_USER:-CMTRecon}
      - RECON_PASS=${RECON_PASS}
      - FEES_USER=${FEES_USER:-CMTFeeProcessor}
      - FEES_PASS=${FEES_PASS}
      - FX_USER=${FX_USER:-CMTFxRates}
      - FX_PASS=${FX_PASS}
      - ADMIN_USER=${ADMIN_USER:-CMTAdmin}
      - ADMIN_PASS=${ADMIN_PASS}
      - RETENTION_USER=${RETENTION_USER:-CMTRetention}
      - RETENTION_PASS=${RETENTION_PASS}
      - CRO_USER=${CRO_USER:-CMTCRO}
      - CRO_PASS=${CRO_PASS}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      # Praxis operations database
      # NOTE: 161.97.162.143:5433 is firewalled from this server (213.199.45.213).
      # To fix: whitelist 213.199.45.213 on the Praxis server firewall + pg_hba.conf.
      - PRAXIS_HOST=161.97.162.143
      - PRAXIS_PORT=5433
      - PRAXIS_DB=operations
      - PRAXIS_USER=praxis_reader
      - PRAXIS_PASS=${PRAXIS_PASS}
      # Antelope CRM — Azure SQL (direct TLS, no tunnel needed, login: reco)
      - CRM_HOST=cmtmainserver.database.windows.net
      - CRM_PORT=1433
      - CRM_DB=cmt_main
      - CRM_USER=${CRM_USER:-reco}
      - CRM_PASS=${CRM_PASS}
      # Fee DB mode: demo (SQLite) or live (fees_postgres service below)
      - FEES_MODE=demo
      - FEES_PG_HOST=fees_postgres
      - FEES_PG_PORT=5432
      - FEES_PG_DB=fees
      - FEES_PG_USER=fees
      - FEES_PG_PASS=${FEES_PG_PASS}
    volumes:
      - /root/recon-app:/app   # mount source → container; rsync + restart is sufficient
      - /root/recon-certs:/app/certs:ro  # dealio mTLS client certs (permissions: key=600, crt=644)
    networks:
      - recon_net
      - backoffice_net
    depends_on:
      - fees_postgres

  fees_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fees
      POSTGRES_USER:     fees
      POSTGRES_PASSWORD: ${FEES_PG_PASS}
    volumes:
      - fees_pgdata:/var/lib/postgresql/data
    networks:
      - recon_net

volumes:
  fees_pgdata:

networks:
  recon_net:
    driver: bridge
  backoffice_net:
    external: true
    name: client-call-manager_default
