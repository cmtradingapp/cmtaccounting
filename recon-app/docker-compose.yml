services:
  recon:
    build: .
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      - DEALIO_HOST=cmtrading-replicadb.dealio.ai
      - DEALIO_PORT=5106
      - DEALIO_DB=dealio
      - DEALIO_USER=dealio_rep
      - DEALIO_PASS=;tnACp*BSIXZ2%mOHTfP
      - BACKOFFICE_HOST=client-call-manager_postgres_1
      - BACKOFFICE_PORT=5432
      - BACKOFFICE_DB=backoffice
      - BACKOFFICE_USER=backoffice
      - BACKOFFICE_PASS=Hdtkfvi12345
      - FLASK_SECRET=cmt-recon-2026
      - RECON_USER=CMTRecon
      - RECON_PASS=5UvJIBkmEeulzmiRG9dFMg
      - FEES_USER=CMTFeeProcessor
      - FEES_PASS=PUlDNl_ZZDirFBxaF8FFtQ
      - FX_USER=CMTFxRates
      - FX_PASS=I0vcjes2tgVfkQxE1DHQac1H
      - ADMIN_USER=${ADMIN_USER:-CMTAdmin}
      - ADMIN_PASS=${ADMIN_PASS:-ChangeMe2026!}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      # Praxis operations database (direct connection from server)
      - PRAXIS_HOST=161.97.162.143
      - PRAXIS_PORT=5433
      - PRAXIS_DB=operations
      - PRAXIS_USER=praxis_reader
      - PRAXIS_PASS=gc6Z8vd92JOa
      # Antelope CRM — Azure SQL (direct TLS, no tunnel needed, login: reco)
      - CRM_HOST=cmtmainserver.database.windows.net
      - CRM_PORT=1433
      - CRM_DB=cmt_main
      - CRM_USER=${CRM_USER:-reco}
      - CRM_PASS=${CRM_PASS}
      # Fee DB mode: demo (SQLite) or live (fees_postgres service below)
      - FEES_MODE=demo
      - FEES_PG_HOST=fees_postgres
      - FEES_PG_PORT=5432
      - FEES_PG_DB=fees
      - FEES_PG_USER=fees
      - FEES_PG_PASS=FeesLive2026!
    volumes:
      - /root/recon-app:/app   # mount source → container; rsync + restart is sufficient
      - /root/client-call-manager/backend/certs:/app/certs:ro  # dealio mTLS client certs
    networks:
      - recon_net
      - backoffice_net
    depends_on:
      - fees_postgres

  fees_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fees
      POSTGRES_USER:     fees
      POSTGRES_PASSWORD: FeesLive2026!
    volumes:
      - fees_pgdata:/var/lib/postgresql/data
    networks:
      - recon_net

volumes:
  fees_pgdata:

networks:
  recon_net:
    driver: bridge
  backoffice_net:
    external: true
    name: client-call-manager_default
