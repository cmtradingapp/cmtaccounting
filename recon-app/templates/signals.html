{% extends "base.html" %}
{% block title %} — Signals{% endblock %}
{% block content %}
<style>
  .sig-rr.pos { color:var(--green); font-weight:700; }
  .sig-rr.neg { color:var(--red);   font-weight:700; }

  /* ── Recent-form strip ───────────────────────────────────────────────── */
  .sig-form-card .value { display:flex; align-items:center; gap:4px; flex-wrap:wrap; height:20px; }
  .sig-form-dot { width:7px; height:7px; flex-shrink:0; }
  .sig-form-dot.win  { background:var(--green); border-radius:50%; }
  .sig-form-dot.loss { background:var(--red);   border-radius:2px; }
  .sig-form-empty { font-size:11px; color:var(--muted); font-weight:400; }

  /* ── Table row accents ──────────────────────────────────────────────── */
  .sig-table { table-layout:fixed; }
  .sig-table th, .sig-table td { overflow:hidden; text-overflow:ellipsis; }
  .sig-table th.sig-col-x { width:26px; padding:7px 4px; }
  .sig-row { border-left:3px solid transparent; }
  .sig-row.st-active { border-left-color:var(--accent); }
  .sig-row.st-tp     { border-left-color:var(--green); }
  .sig-row.st-sl      { border-left-color:var(--red); }
  @keyframes sig-flash { 0% { background:rgba(91,157,255,.24); } 100% { background:transparent; } }
  .sig-row.flash-new { animation:sig-flash 1.8s ease-out; }
  @media (prefers-reduced-motion:reduce) {
    .sig-row.flash-new { animation:none; }
  }

  /* ── Expand toggle + detail row ──────────────────────────────────────── */
  .sig-expand-btn {
    background:none; border:none; color:var(--muted); cursor:pointer;
    font-size:10px; padding:3px 5px; line-height:1; border-radius:4px;
    transition:transform .15s, color .15s, background .15s;
  }
  .sig-expand-btn:hover { color:var(--text); background:rgba(255,255,255,.06); }
  .sig-expand-btn.open { transform:rotate(90deg); color:var(--accent); }
  .sig-expand-btn:focus-visible { outline:2px solid var(--accent); outline-offset:1px; }
  .sig-detail-row td { background:rgba(255,255,255,.015); padding:12px 16px 16px 34px; }
  .sig-detail-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(100px,1fr)); gap:10px 22px; }
  .sig-detail-item .k { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); }
  .sig-detail-item .v { font-family:var(--font-mono); font-size:12px; color:var(--text); margin-top:2px; }

  /* ── Trade bracket (SL — Entry — TP — exit) ─────────────────────────── */
  .bracket { position:relative; width:100%; min-width:80px; height:22px; cursor:default; }
  .bracket .track { position:absolute; left:3px; right:3px; top:50%; height:2px; background:var(--border-2); transform:translateY(-50%); border-radius:2px; }
  .bracket .tick { position:absolute; top:50%; width:2px; height:12px; transform:translate(-50%,-50%); border-radius:1px; }
  .bracket .tick.sl { background:var(--red); }
  .bracket .tick.tp { background:var(--green); }
  .bracket .dot { position:absolute; width:6px; height:6px; border-radius:50%; transform:translate(-50%,-50%); border:2px solid var(--surface); }
  /* Entry sits slightly above the SL/TP tick line so it never fully occludes a
     tick when entry_price coincides with sl_price or tp_price. */
  .bracket .dot.entry { top:32%; background:var(--text-2); }
  .bracket .dot.exit  { top:50%; background:var(--text-2); } /* fallback if outcome is missing/unrecognized */
  .bracket .dot.exit.tp { background:var(--green); }
  .bracket .dot.exit.sl { background:var(--red); }

  /* ── RSI gauge ───────────────────────────────────────────────────────── */
  .rsi-gauge { width:56px; max-width:100%; }
  .rsi-gauge .track {
    position:relative; height:5px; border-radius:3px;
    background:linear-gradient(90deg,
      rgba(52,211,153,.55) 0%, rgba(52,211,153,.55) 30%,
      rgba(255,255,255,.07) 30%, rgba(255,255,255,.07) 70%,
      rgba(248,113,113,.55) 70%, rgba(248,113,113,.55) 100%);
  }
  .rsi-gauge .marker { position:absolute; top:-2px; width:2px; height:9px; background:var(--text); border-radius:1px; transform:translateX(-50%); }
  .rsi-gauge .val { font-family:var(--font-mono); font-size:10px; color:var(--muted); margin-top:3px; }

  /* ── Instrument cell ─────────────────────────────────────────────────── */
  .sig-instrument .sym { font-weight:700; }
  .sig-instrument .tf  { font-size:10px; color:var(--muted); margin-left:5px; }

  /* ── Filter bar extras ───────────────────────────────────────────────── */
  .sig-linklike {
    background:none; border:none; color:var(--muted); font-size:11px; font-weight:600;
    cursor:pointer; padding:0; transition:color .15s;
  }
  .sig-linklike:hover { color:var(--accent); }

  /* Min-R:R filter — the user types a reward:risk floor; list + stats follow. */
  .sig-minrr { display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--muted); white-space:nowrap; }
  .sig-minrr input {
    width:52px; background:var(--surface); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:4px 6px; font-family:var(--font-mono); font-size:12px;
  }
  .sig-minrr input::placeholder { color:var(--muted); }
  .sig-minrr input:focus-visible { outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent); }

  /* S/R-mode controls: EA/S-R segmented switch + level target + overlay. */
  .sig-sr { display:inline-flex; align-items:center; gap:8px; }
  .sig-srlvl { display:inline-flex; align-items:center; gap:6px; }
  .sig-seg { display:inline-flex; border:1px solid var(--border); border-radius:7px; overflow:hidden; }
  .sig-seg .filter-btn { border:none; border-radius:0; margin:0; }
  .sig-seg .filter-btn + .filter-btn { border-left:1px solid var(--border); }
  .sig-seg-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
  .sig-ov { display:inline-flex; align-items:center; gap:3px; font-family:var(--font-mono); font-size:11px; color:var(--muted); cursor:pointer; }
  .sig-ov input { accent-color:var(--accent); cursor:pointer; margin:0; }
  .sig-ov:has(input:checked) { color:var(--text); }
  .stat-sub { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin-top:2px; }

  /* base.html gives .filter-bar (and the cards/table below it) a reveal
     animation, which makes each a stacking context painted in DOM order — so
     later content would otherwise cover the open symbol menu (which is trapped
     inside the filter bar's context). Lift the bar above that content. Kept
     below the sticky nav's z-index (50). */
  .filter-bar { position:relative; z-index:40; }

  /* Multi-select symbol filter — a button that opens a checklist panel. */
  .sig-ms { position:relative; display:inline-block; }
  .sig-ms-btn {
    display:inline-flex; align-items:center; justify-content:space-between; gap:8px; min-width:130px;
    background:var(--surface); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:5px 10px; font-size:12px; cursor:pointer; transition:border-color .15s, color .15s;
  }
  .sig-ms-btn:hover { border-color:var(--border-2); }
  .sig-ms-btn.active { border-color:var(--accent); color:var(--accent); }
  .sig-ms-btn:focus-visible { outline:2px solid var(--accent); outline-offset:1px; }
  .sig-ms-caret { color:var(--muted); font-size:10px; }
  .sig-ms-btn.active .sig-ms-caret { color:var(--accent); }
  .sig-ms-menu {
    position:absolute; top:calc(100% + 5px); left:0; z-index:60;
    min-width:180px; max-height:288px; overflow-y:auto;
    background:var(--surface); border:1px solid var(--border); border-radius:9px;
    box-shadow:0 12px 32px -8px rgba(0,0,0,.65); padding:5px;
  }
  .sig-ms-item {
    display:flex; align-items:center; gap:9px; padding:6px 9px; border-radius:6px;
    font-size:12px; color:var(--text); cursor:pointer; user-select:none; white-space:nowrap;
  }
  .sig-ms-item:hover { background:rgba(255,255,255,.06); }
  .sig-ms-item input { accent-color:var(--accent); cursor:pointer; margin:0; }
  .sig-ms-item.all { color:var(--muted); font-weight:600; }
  .sig-ms-sep { height:1px; background:var(--border); margin:5px 3px; }

  /* ── Boxes view ──────────────────────────────────────────────────────── */
  .sig-boxes-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:16px; }
  /* .card already gives the gradient sheen + shadow + reveal-in animation every
     other surface in the app uses — layer state/layout specifics on top of it
     rather than reinventing a flat surface. */
  .sig-box {
    position:relative; overflow:hidden; border-radius:14px;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .sig-box:hover { transform:translateY(-2px); border-color:rgba(255,255,255,.2); }
  .sig-box::before { content:''; position:absolute; inset:0 0 auto 0; height:2px; opacity:.75; z-index:1; }
  .sig-box.st-active::before { background:linear-gradient(90deg, var(--accent), transparent 75%); }
  .sig-box.st-tp::before     { background:linear-gradient(90deg, var(--green),  transparent 75%); }
  .sig-box.st-sl::before     { background:linear-gradient(90deg, var(--red),    transparent 75%); }
  .sig-box-head { position:relative; display:flex; align-items:center; gap:7px; padding:11px 14px; border-bottom:1px solid var(--border); }
  .sig-box-head .sig-rr { margin-left:auto; font-family:var(--font-mono); font-size:12px; }
  .sig-box-chart { height:260px; position:relative; background:var(--bg); box-shadow:inset 0 1px 8px rgba(0,0,0,.35); }
  .sig-box-chart-msg { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:12px; text-align:center; padding:0 12px; }
  .sig-box-overlay { position:absolute; inset:0; pointer-events:none; }
  .sig-cutoff-shade { position:absolute; top:0; bottom:0; right:0; background:rgba(91,157,255,.05); border-left:1px dashed rgba(91,157,255,.55); }
  .sig-cutoff-label {
    position:absolute; top:2px; transform:translateX(-100%);
    font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    color:var(--accent); background:rgba(9,11,16,.75); padding:1px 4px; border-radius:3px; white-space:nowrap;
  }
  .sig-tri { position:absolute; right:1px; width:0; height:0; transform:translateY(-50%); }
  .sig-tri-sl { border-top:5px solid transparent; border-bottom:5px solid transparent; border-right:7px solid var(--red); }
  .sig-tri-tp { border-top:5px solid transparent; border-bottom:5px solid transparent; border-right:7px solid var(--green); }
  /* Resistance / support markers — the signal-flag banner shape, smaller, on the
     right edge pointing left at the level. Red = resistance (overhead), green =
     support (below). */
  .sig-lvl-flag {
    position:absolute; right:1px; width:10px; height:12px; transform:translateY(-50%);
    clip-path: polygon(100% 0%, 100% 100%, 40% 100%, 0% 50%, 40% 0%);
    box-shadow:0 1px 3px rgba(0,0,0,.4);
  }
  .sig-lvl-flag.resistance { background:var(--red); }
  .sig-lvl-flag.support    { background:var(--green); }

  /* Signal-entry pointer — a slim banner tapering to a point, tip anchored
     exactly on the entry candle/price. Kept small on purpose; the direction
     label lives in .sig-signal-label just above it, not crammed inside. */
  .sig-signal-flag {
    position:absolute; width:14px; height:16px; transform:translate(-50%,-100%);
    clip-path: polygon(8% 0%, 92% 0%, 100% 55%, 50% 100%, 0% 55%);
    box-shadow:0 1px 4px rgba(0,0,0,.45);
  }
  /* Below-bar variant (BUY): same banner, vertically mirrored — tip now at
     the TOP (touching the entry price from underneath) instead of the
     bottom, box sitting below the anchor instead of above it. */
  .sig-signal-flag.below {
    transform:translate(-50%,0%);
    clip-path: polygon(8% 100%, 92% 100%, 100% 45%, 50% 0%, 0% 45%);
  }
  .sig-signal-flag.buy  { background:var(--green); }
  .sig-signal-flag.sell { background:var(--red); }
  .sig-signal-label {
    position:absolute; transform:translate(-50%,-100%); white-space:nowrap;
    font-size:8px; font-weight:800; text-transform:uppercase; letter-spacing:.03em;
    padding:1px 4px; border-radius:3px; background:rgba(9,11,16,.85);
  }
  /* Mirrors .sig-signal-flag.below — label sits just under the flag instead of above it. */
  .sig-signal-label.below { transform:translate(-50%,0%); }
  .sig-signal-label.buy  { color:var(--green); }
  .sig-signal-label.sell { color:var(--red); }
  .sig-box-foot { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:8px 12px; border-top:1px solid var(--border); }

  /* ── Signal description (plain-English read of the setup) ─────────────────── */
  /* Values are colour-coded by meaning so the sentence reads at a glance:
     green = upside/resistance, red = downside/support, blue = entry & RSI,
     amber = the stop / marker level. */
  .sig-desc-val   { font-family:var(--font-mono); font-weight:700; }
  .sig-desc-entry { color:var(--accent); }
  .sig-desc-rsi   { color:var(--accent); }
  .sig-desc-up    { color:var(--green); }
  .sig-desc-down  { color:var(--red); }
  .sig-desc-stop  { color:#fbbf24; }
  /* On cards: a caption below the chart/panel. No line-clamp — it wraps to as
     many lines as the sentence needs so long instruments (e.g. BTCUSD's
     5-6 digit levels) never clip. */
  .sig-box-desc {
    padding:11px 13px; border-top:1px solid var(--border);
    font-size:12px; line-height:1.55; color:var(--text-2);
  }
  /* In the table's expanded detail: a full sentence above the field grid. */
  .sig-detail-desc { margin-bottom:13px; font-size:13px; line-height:1.55; color:var(--text-2); max-width:74ch; }

  /* ── Reward:risk capsule (planned R:R + "high-potential" highlight) ────────
     A proportional risk(red)|reward(green) split, sized to the real entry→SL /
     entry→TP distances (reward:risk = R:1) — a 1-D echo of the Anatomy zones.
     Tiered eye-candy: strong (≥2R) shimmers; prime (≥3R) turns gold and haloes
     the whole card. Gold is reserved for prime only, so it reads as a prize. */
  /* A twin of the RSI gauge (same 56px width, bar-over-label stack) so the two
     line up perfectly in the footer. */
  .sig-rrm { display:inline-flex; flex-direction:column; align-items:flex-start; gap:3px; }
  .sig-rrm-track {
    position:relative; width:56px; height:5px; border-radius:3px; overflow:hidden;
    display:flex; box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
  }
  .sig-rrm-risk   { background:linear-gradient(180deg, #fb9a9a, var(--red)); }
  .sig-rrm-reward { position:relative; background:linear-gradient(180deg, #5fe3ad, var(--green)); }
  .sig-rrm-val    { font-family:var(--font-mono); font-size:10px; color:var(--muted); white-space:nowrap; }
  .sig-rrm-val b  { font-weight:700; color:var(--text-2); }
  .sig-rrm.fair .sig-rrm-val b, .sig-rrm.strong .sig-rrm-val b { color:var(--green); }
  .sig-rrm.prime .sig-rrm-val b { color:#f5c451; }
  .sig-rrm.thin  .sig-rrm-val b, .sig-rrm.na .sig-rrm-val b { color:var(--muted); }
  .sig-rrm.prime .sig-rrm-track { box-shadow:inset 0 0 0 1px rgba(245,196,81,.6), 0 0 7px rgba(245,196,81,.4); }
  /* One shimmer sweep, reserved for prime (≥3R) setups — the single standout. */
  .sig-rrm.prime .sig-rrm-reward::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(100deg, transparent 15%, rgba(255,255,255,.6) 50%, transparent 85%);
    transform:translateX(-130%); animation:sig-rrm-sweep 2.8s ease-in-out infinite;
  }
  @keyframes sig-rrm-sweep { 0% { transform:translateX(-130%); } 55%, 100% { transform:translateX(240%); } }
  /* Prime cards glow gold in the grid — the "this one's worth a look" moment. */
  .sig-box.rr-prime       { border-color:rgba(245,196,81,.42); box-shadow:0 0 0 1px rgba(245,196,81,.28), 0 10px 30px -10px rgba(245,196,81,.5); }
  .sig-box.rr-prime:hover { border-color:rgba(245,196,81,.7);  box-shadow:0 0 0 1px rgba(245,196,81,.5),  0 14px 34px -8px rgba(245,196,81,.62); }
  @media (prefers-reduced-motion:reduce) {
    .sig-rrm .sig-rrm-reward::after { animation:none; display:none; }
  }
  /* Footer: RSI + R:R gauges grouped left (bottoms aligned), timing on the right. */
  .sig-box-foot   { flex-wrap:wrap; row-gap:6px; }
  .sig-foot-metrics { display:flex; align-items:flex-end; gap:16px; }
  .sig-foot-time  { white-space:nowrap; }

  /* ── Anatomy view (inline SVG trade panel) ───────────────────────────────
     A second card mode alongside Boxes. Where Boxes plots the (coarse, hourly)
     price history, Anatomy draws the trade itself from the signal's own numbers
     — reward/risk zones to real price scale, the entry as the accent anchor,
     and the entry→close path — so a fast M1/M5 trade that lives inside a single
     hourly candle is still fully legible. No price feed, no charting library. */
  .sig-box-plot { height:230px; position:relative; background:var(--bg); box-shadow:inset 0 1px 8px rgba(0,0,0,.35); }
  .sig-box-plot svg { display:block; width:100%; height:100%; }
  /* Dark halo behind every label so prices stay legible where the resolution
     path or a zone edge crosses them. */
  .sig-box-plot text { paint-order:stroke; stroke:rgba(9,11,16,.9); stroke-width:2.5px; stroke-linejoin:round; }
  .sig-box-plot text.sig-plot-glyph { stroke:none; }
  .sig-plot-band-tp { fill:rgba(52,211,153,.11); }
  .sig-plot-band-sl { fill:rgba(248,113,113,.11); }
  .sig-plot-line-tp    { stroke:var(--green); stroke-width:1; stroke-dasharray:4 3; }
  .sig-plot-line-sl    { stroke:var(--red);   stroke-width:1; stroke-dasharray:4 3; }
  .sig-plot-line-entry { stroke:rgba(255,255,255,.14); stroke-width:1; }
  .sig-plot-path      { fill:none; stroke:var(--text-2); stroke-width:1.75; stroke-dasharray:3 3; }
  .sig-plot-path.tp   { stroke:var(--green); }
  .sig-plot-path.sl   { stroke:var(--red); }
  .sig-plot-label       { font-family:var(--font-mono); font-size:10px; font-weight:600; }
  .sig-plot-label.tp    { fill:var(--green); }
  .sig-plot-label.sl    { fill:var(--red); }
  .sig-plot-label.entry { fill:var(--accent); }
  .sig-plot-delta       { font-family:var(--font-mono); font-size:9.5px; fill:var(--muted); }
  .sig-plot-entry-dot   { fill:var(--accent); }
  .sig-plot-entry-dot.live { animation:sig-plot-pulse 1.6s ease-in-out infinite; }
  @keyframes sig-plot-pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
  @media (prefers-reduced-motion:reduce) { .sig-plot-entry-dot.live { animation:none; } }
  /* Overlay S/R guide lines (S/R mode): thin muted dashes with a tiny tag. */
  .sig-plot-ov      { stroke:rgba(255,255,255,.16); stroke-width:1; stroke-dasharray:2 3; }
  .sig-plot-ov-lbl  { font-family:var(--font-mono); font-size:8px; fill:var(--muted); }
</style>

<div class="page-header">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="page-title">Signals</div>
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);">
      <span class="live-dot"></span><span>Live</span>
    </div>
  </div>
  <div style="font-size:12px;color:var(--muted);" id="sigUpdated"></div>
</div>

<div class="stats-grid" id="sigStats"></div>

<div class="filter-bar">
  <button class="filter-btn active" data-view="table" onclick="setView('table',this)">Table</button>
  <button class="filter-btn" data-view="boxes" onclick="setView('boxes',this)">Boxes</button>
  <button class="filter-btn" data-view="anatomy" onclick="setView('anatomy',this)">Anatomy</button>
  <span style="width:1px;height:20px;background:var(--border);margin:0 4px;"></span>
  <button class="filter-btn active" data-status="" onclick="setStatusFilter('',this)">All</button>
  <button class="filter-btn" data-status="ACTIVE" onclick="setStatusFilter('ACTIVE',this)">Active</button>
  <button class="filter-btn" data-status="CLOSED" onclick="setStatusFilter('CLOSED',this)">Closed</button>
  <span style="width:1px;height:20px;background:var(--border);margin:0 4px;"></span>
  <button class="filter-btn active" data-dir="" onclick="setDirFilter('',this)">Buy &amp; Sell</button>
  <button class="filter-btn" data-dir="BUY" onclick="setDirFilter('BUY',this)">Buy</button>
  <button class="filter-btn" data-dir="SELL" onclick="setDirFilter('SELL',this)">Sell</button>
  <span style="width:1px;height:20px;background:var(--border);margin:0 4px;"></span>
  <div class="sig-ms" id="symbolMs">
    <button type="button" class="sig-ms-btn" id="symbolMsBtn" onclick="toggleSymbolMenu(event)"
            aria-haspopup="true" aria-expanded="false">
      <span id="symbolMsLabel">All symbols</span><span class="sig-ms-caret">▾</span>
    </button>
    <div class="sig-ms-menu" id="symbolMsMenu" role="menu" hidden></div>
  </div>
  <select id="tfPicker" onchange="applyFilters()">
    <option value="">All timeframes</option>
    <option value="M1">M1</option><option value="M5">M5</option>
    <option value="M15">M15</option><option value="M30">M30</option>
  </select>
  <span class="sig-minrr" title="Show only setups whose planned reward:risk is at or above this value — the stats update to match">
    <label for="minRrInput">R:R ≥</label>
    <input type="number" id="minRrInput" min="0" step="0.5" inputmode="decimal" placeholder="any" oninput="onMinRrInput()">
  </span>
  <button class="sig-linklike" id="expandAllBtn" onclick="expandAll()" style="margin-left:8px;">Expand all</button>
  <button class="sig-linklike" id="collapseAllBtn" onclick="collapseAll()">Collapse all</button>
  <span id="chartTypeToggle" style="display:none;align-items:center;gap:6px;margin-left:8px;">
    <button class="filter-btn active" data-chart-type="candle" onclick="setChartType('candle',this)">Candles</button>
    <button class="filter-btn" data-chart-type="line" onclick="setChartType('line',this)">Line</button>
  </span>
  <span class="sig-sr" style="margin-left:8px;">
    <span class="sig-seg" role="group" aria-label="Level framing"
          title="EA: the signal's own SL/TP. S/R: derive stop &amp; target from the support/resistance levels; win rate is backtested.">
      <button class="filter-btn active" data-srmode="ea" onclick="setSrMode(false,this)">EA</button>
      <button class="filter-btn" data-srmode="sr" onclick="setSrMode(true,this)">S/R</button>
    </span>
    <span class="sig-srlvl" id="srLevelPick" style="display:none;">
      <span class="sig-seg-lbl">Target</span>
      <span class="sig-seg" role="group" aria-label="Active S/R level">
        <button class="filter-btn active" data-srlvl="1" onclick="setSrLevel(1,this)">1</button>
        <button class="filter-btn" data-srlvl="2" onclick="setSrLevel(2,this)">2</button>
        <button class="filter-btn" data-srlvl="3" onclick="setSrLevel(3,this)">3</button>
      </span>

      <label class="sig-ov"><input type="checkbox" data-ov="3" onchange="toggleOverlay(3,this)">3</label>

</div>

<!-- TradingView Lightweight Charts — same version/CDN already used by the FX tab -->
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script>
var _view = 'table';
var _statusFilter = '';
var _dirFilter = '';
var _rows = [];
var _seenIds = new Set();
var _expandedIds = new Set();
var _hasRenderedOnce = false;
var _listReqSeq = 0;
var _statsReqSeq = 0;
var _minRrTimer = null;
var _selectedSymbols = new Set(); // empty = all symbols (no filter)
var _lastSymbolsKey = '';         // rebuild the symbol menu only when the list changes
var _symApplyTimer = null;
var _formRows = null; // cached recent-closed signals for the Recent Form strip
// S/R-level framing. _srMode swaps the EA's sl/tp for support/resistance levels;
// _srLevel (1/2/3) is the active level that drives SL/TP + KPIs; _srOverlay is
// the set of levels drawn as extra guide lines (visual only). All persisted.
var _srMode  = (localStorage.getItem('sigSrMode') === '1');
var _srLevel = parseInt(localStorage.getItem('sigSrLevel') || '1', 10) || 1;
var _srOverlay = new Set((localStorage.getItem('sigSrOverlay') || '').split(',').filter(Boolean).map(Number));

// The effective entry / stop / target for a signal under the current framing —
// the single source of truth every renderer routes through. EA framing uses the
// stored sl/tp/close; S/R framing derives target from the selected level
// (BUY resistance_N / SELL support_N) but pins the stop to the NEAREST level
// (BUY support_1 / SELL resistance_1), so switching levels moves only the
// target. Uses the backtested sr_outcome (WIN/LOSS/PENDING). `entry` stays on
// the object because R:R is measured from it, but it is never displayed.
function effLevels(r) {
  if (!_srMode) {
    return { entry:r.entry_price, sl:r.sl_price, tp:r.tp_price,
             outcome:r.outcome, closePrice:r.close_price, mode:'ea' };
  }
  var isBuy = r.direction === 'BUY';
  var tp = isBuy ? r['resistance_' + _srLevel] : r['support_' + _srLevel]; // target = selected level
  var sl = isBuy ? r.support_1 : r.resistance_1;                            // stop = nearest level
  if (tp == null || sl == null) return null; // level missing for this signal
  return { entry:r.entry_price, sl:sl, tp:tp,
           outcome:r.sr_outcome, closePrice:null, mode:'sr', level:_srLevel };
}

function fmtNum(v, d) {
  if (v === null || v === undefined) return '—';
  return Number(v).toFixed(d === undefined ? 5 : d);
}
function fmtTs(v) {
  if (!v) return '—';
  return String(v).replace('T', ' ').slice(0, 16);
}
function relTime(iso) {
  if (!iso) return '—';
  var mins = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  var hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}
// Realised R. EA: from the actual close. S/R: a win banks the full planned R
// (price reached the target); a loss is −1R (hit the stop); pending → null.
function achievedRR(row) {
  var L = effLevels(row);
  if (L && L.mode === 'sr') {
    if (L.outcome === 'WIN')  return plannedRR(row);
    if (L.outcome === 'LOSS') return -1;
    return null;
  }
  if (row.status !== 'CLOSED' || row.close_price == null) return null;
  var reward = row.direction === 'BUY' ? (row.close_price - row.entry_price) : (row.entry_price - row.close_price);
  var risk   = row.direction === 'BUY' ? (row.entry_price - row.sl_price)   : (row.sl_price - row.entry_price);
  if (!risk) return null;
  return reward / risk;
}
// Planned reward:risk of the setup — reward (entry→target) over risk (entry→stop)
// under the active framing (EA or S/R level). The "potential", per card.
function plannedRR(r) {
  var L = effLevels(r);
  if (!L) return null;
  var reward = r.direction === 'BUY' ? (L.tp - L.entry) : (L.entry - L.tp);
  var risk   = r.direction === 'BUY' ? (L.entry - L.sl) : (L.sl - L.entry);
  if (!(risk > 0) || !(reward > 0)) return null;
  return reward / risk;
}
function rrTier(rr) {
  if (rr == null) return 'na';
  if (rr >= 3) return 'prime';
  if (rr >= 2) return 'strong';
  if (rr >= 1) return 'fair';
  return 'thin';
}
// The reward:risk capsule — proportional risk|reward split + the planned R
// multiple, coloured by tier. Prime setups (≥3R) get the gold treatment.
function rrMeterHtml(r) {
  var rr = plannedRR(r);
  if (rr == null) return '<span class="sig-rrm na"><span class="sig-rrm-track"></span><span class="sig-rrm-val">R:R <b>—</b></span></span>';
  var rewardPct = (rr / (rr + 1)) * 100;
  return '<span class="sig-rrm ' + rrTier(rr) + '" title="Planned reward:risk — ' + rr.toFixed(1) + ' : 1">' +
    '<span class="sig-rrm-track">' +
      '<span class="sig-rrm-risk" style="width:' + (100 - rewardPct).toFixed(1) + '%"></span>' +
      '<span class="sig-rrm-reward" style="width:' + rewardPct.toFixed(1) + '%"></span>' +
    '</span>' +
    '<span class="sig-rrm-val">R:R <b>' + rr.toFixed(1) + '</b></span>' +
  '</span>';
}
// Prime setups earn a card-level gold halo so they stand out in the grid.
function rrCardClass(r) {
  return rrTier(plannedRR(r)) === 'prime' ? ' rr-prime' : '';
}
function fmtDuration(ms) {
  var s = Math.round(ms / 1000);
  if (s < 60) return s + 's';
  var m = Math.round(s / 60);
  if (m < 60) return m + 'm';
  var h = Math.round(m / 60);
  if (h < 48) return h + 'h';
  return Math.round(h / 24) + 'd';
}
// Sensible decimal precision from the price magnitude: 2dp for indices/metals
// like GOLD (2401.05) and USTECH, 3dp for mid-range like SILVER (55.550), 5dp
// for FX majors like EURUSD (1.08500) that carry pip/pipette precision.
function priceDecimals(r) {
  var m = Math.max(Math.abs(r.entry_price || 0), Math.abs(r.tp_price || 0), Math.abs(r.sl_price || 0));
  if (m >= 100) return 2;
  if (m >= 10)  return 3;
  return 5;
}
function tradeDurationText(r) {
  if (r.status === 'CLOSED' && r.close_time) return 'closed in ' + fmtDuration(new Date(r.close_time) - new Date(r.signal_time));
  return 'active ' + fmtDuration(Date.now() - new Date(r.signal_time));
}

// ── Signal descriptions ────────────────────────────────────────────────────
// A short plain-English read of the setup, composed from fixed templates with
// the signal's own levels filled in. Structural lines are always eligible; the
// RSI-state lines join the pool only in oversold (BUY, rsi<30) / overbought
// (SELL, rsi>70) territory. The pick is deterministic per signal id so the
// wording is stable across the 2s poll re-render (no flicker).
var _descBuy = [
  "Holding above {support_1} keeps the upside in focus, with {resistance_1} and {resistance_2} as the levels overhead.",
  "Above {support_1}, the near-term path leans higher toward {resistance_1}, then {resistance_2}.",
  "Buyers stay in control while {support_1} holds; {resistance_1} and {resistance_2} sit above.",
  "A base around {support_1} opens room toward {resistance_1}, with {resistance_2} beyond it.",
  "With {support_1} holding, the next hurdles are {resistance_1} and {resistance_2}.",
  "While {support_1} isn't lost, the upside band runs {resistance_1} to {resistance_2}.",
  "Support at {support_1} frames a move toward {resistance_1}; a push through opens {resistance_2}.",
  "Recovery off {support_1} keeps {resistance_1} in reach, with {resistance_2} as the stretch level.",
  "The structure favours strength above {support_1}, mapping {resistance_1} and {resistance_2} as upside markers.",
  "Firm above {support_1}, attention turns to {resistance_1} first, {resistance_2} on continuation."
];
var _descBuyRsi = [
  "With RSI at {rsi}, price looks stretched toward {support_1}; a snap back could reach {resistance_1} and {resistance_2}.",
  "Oversold at RSI {rsi} — a recovery off {support_1} has {resistance_1} and {resistance_2} overhead.",
  "RSI {rsi} sits in oversold territory; a turn off {support_1} points first at {resistance_1}."
];
var _descSell = [
  "Capped below {resistance_1}, the downside stays in focus toward {support_1} and {support_2}.",
  "Below {resistance_1}, the near-term path leans lower to {support_1}, then {support_2}.",
  "Sellers hold the upper hand while {resistance_1} caps price; {support_1} and {support_2} sit below.",
  "A ceiling near {resistance_1} exposes {support_1}, with {support_2} underneath.",
  "With {resistance_1} capping, the next floors are {support_1} and {support_2}.",
  "While {resistance_1} holds price back, the downside band runs {support_1} to {support_2}.",
  "Resistance at {resistance_1} frames a slide toward {support_1}; a break lower opens {support_2}.",
  "Rejection from {resistance_1} keeps {support_1} in reach, with {support_2} as the stretch level.",
  "The structure favours weakness below {resistance_1}, mapping {support_1} and {support_2} as downside markers.",
  "Heavy under {resistance_1}, attention turns to {support_1} first, {support_2} on continuation."
];
var _descSellRsi = [
  "With RSI at {rsi}, price looks stretched toward {resistance_1}; a fade could reach {support_1} and {support_2}.",
  "Overbought at RSI {rsi} — a rejection from {resistance_1} has {support_1} and {support_2} below.",
  "RSI {rsi} sits in overbought territory; a turn off {resistance_1} points first at {support_1}."
];

// Returns { text, html } or null. `html` wraps each filled-in value in a
// .sig-desc-val span; `text` is the plain version (for title/aria).
function signalDescription(r) {
  var isBuy = r.direction === 'BUY';
  var pool = (isBuy ? _descBuy : _descSell).slice();
  if (isBuy && r.rsi_value != null && r.rsi_value < 30) pool = pool.concat(_descBuyRsi);
  if (!isBuy && r.rsi_value != null && r.rsi_value > 70) pool = pool.concat(_descSellRsi);

  var dec = priceDecimals(r);
  function px(v) { return v == null ? null : Number(v).toFixed(dec); }
  var vals = {
    resistance_1: px(r.resistance_1), resistance_2: px(r.resistance_2),
    support_1: px(r.support_1), support_2: px(r.support_2),
    rsi: r.rsi_value == null ? null : Number(r.rsi_value).toFixed(1)
  };
  // Only keep templates whose every referenced placeholder resolves — so a
  // signal missing (say) resistance_2 never renders "and —".
  var eligible = pool.filter(function(t) {
    return (t.match(/\{(\w+)\}/g) || []).every(function(m) { return vals[m.slice(1, -1)] != null; });
  });
  if (!eligible.length) return null;
  var tpl = eligible[Math.abs(r.id) % eligible.length];
  // Colour-code each value by meaning (up = resistance, down = support, rsi).
  var cls = { rsi:'rsi', resistance_1:'up', resistance_2:'up', support_1:'down', support_2:'down' };
  return {
    text: tpl.replace(/\{(\w+)\}/g, function(_, k) { return vals[k]; }),
    html: tpl.replace(/\{(\w+)\}/g, function(_, k) {
      return '<span class="sig-desc-val sig-desc-' + (cls[k] || 'entry') + '">' + vals[k] + '</span>';
    })
  };
}

function setView(v, btn) {
  _view = v;
  btn.parentNode.querySelectorAll('[data-view]').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('tableWrap').style.display  = (v === 'table')   ? '' : 'none';
  document.getElementById('sigBoxes').style.display   = (v === 'boxes')   ? '' : 'none';
  document.getElementById('sigAnatomy').style.display = (v === 'anatomy') ? '' : 'none';
  document.getElementById('expandAllBtn').style.display   = (v === 'table') ? '' : 'none';
  document.getElementById('collapseAllBtn').style.display = (v === 'table') ? '' : 'none';
  // Candles/Line toggle only applies to the price-history Boxes view.
  document.getElementById('chartTypeToggle').style.display = (v === 'boxes') ? 'inline-flex' : 'none';
  if (v === 'boxes')   { _lastBoxSignature = '';     renderCurrentView(); }
  if (v === 'anatomy') { _lastAnatomySignature = ''; renderCurrentView(); }
}
function setChartType(type, btn) {
  _chartType = type;
  btn.parentNode.querySelectorAll('[data-chart-type]').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  // Re-render every currently-instantiated chart from its cached data — no
  // need to re-fetch, switching type doesn't change the underlying bars.
  Object.keys(_chartInstances).forEach(function(idStr) {
    var id = parseInt(idStr, 10);
    var cached = _chartCache[id];
    if (cached) renderChart(id, cached.data);
  });
}
// Shared query params for the list + stats + recent-form fetches, so they always
// filter identically. Status is only sent to the list (it's a lifecycle view for
// the table/cards, not a driver of the summary stats).
function filterParams(withStatus) {
  var p = new URLSearchParams();
  if (withStatus && _statusFilter) p.set('status', _statusFilter);
  if (_dirFilter) p.set('direction', _dirFilter);
  _selectedSymbols.forEach(function(s){ p.append('symbol', s); }); // repeated ?symbol= for multi-select
  var tf = document.getElementById('tfPicker').value;
  if (tf) p.set('timeframe', tf);
  var minRr = parseFloat(document.getElementById('minRrInput').value);
  if (isFinite(minRr) && minRr >= 0) p.set('min_rr', String(minRr));
  if (_srMode) p.set('sr_level', String(_srLevel)); // backtested S/R framing
  return p;
}
// Any change to a stats-driving filter (symbol / timeframe / direction / min R:R)
// refreshes both the list and the stat cards.
function applyFilters() { loadStats(); loadList(); }
function onMinRrInput() {
  clearTimeout(_minRrTimer);
  _minRrTimer = setTimeout(applyFilters, 300); // debounce while typing
}

// ── S/R-level framing controls ──────────────────────────────────────────────
function syncSrControls() {
  document.querySelectorAll('[data-srmode]').forEach(function(b){ b.classList.toggle('active', (b.getAttribute('data-srmode')==='sr') === _srMode); });
  document.getElementById('srLevelPick').style.display = _srMode ? 'inline-flex' : 'none';
  document.querySelectorAll('[data-srlvl]').forEach(function(b){ b.classList.toggle('active', parseInt(b.getAttribute('data-srlvl'),10) === _srLevel); });
  document.querySelectorAll('[data-ov]').forEach(function(cb){ cb.checked = _srOverlay.has(parseInt(cb.getAttribute('data-ov'),10)); });
}
// Repaint the card views from cached rows (mode/level change is client-side for
// SL/TP/R:R/zones); loadStats+loadList refetch the backtested outcomes + KPIs.
function repaintSr() {
  _lastBoxSignature = ''; _lastAnatomySignature = '';
  renderCurrentView();
  applyFilters();
}
function setSrMode(on, btn) {
  _srMode = !!on;
  localStorage.setItem('sigSrMode', _srMode ? '1' : '0');
  syncSrControls();
  repaintSr();
}
function setSrLevel(n, btn) {
  _srLevel = n;
  localStorage.setItem('sigSrLevel', String(n));
  syncSrControls();
  repaintSr();
}
function toggleOverlay(n, cb) {
  if (cb.checked) _srOverlay.add(n); else _srOverlay.delete(n);
  localStorage.setItem('sigSrOverlay', Array.from(_srOverlay).join(','));
  cb.closest('.sig-ov').classList.toggle('on', cb.checked);
  _lastBoxSignature = ''; _lastAnatomySignature = '';
  renderCurrentView(); // overlay is visual only — no refetch
}

// ── Symbol multi-select ─────────────────────────────────────────────────────
function symbolMenuOpen() { return !document.getElementById('symbolMsMenu').hasAttribute('hidden'); }
function openSymbolMenu()  { document.getElementById('symbolMsMenu').removeAttribute('hidden'); document.getElementById('symbolMsBtn').setAttribute('aria-expanded','true'); }
function closeSymbolMenu() { document.getElementById('symbolMsMenu').setAttribute('hidden',''); document.getElementById('symbolMsBtn').setAttribute('aria-expanded','false'); }
function toggleSymbolMenu(e) { if (e) e.stopPropagation(); symbolMenuOpen() ? closeSymbolMenu() : openSymbolMenu(); }
document.addEventListener('click', function(e){
  var ms = document.getElementById('symbolMs');
  if (ms && !ms.contains(e.target) && symbolMenuOpen()) closeSymbolMenu();
});
document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && symbolMenuOpen()) closeSymbolMenu(); });

function updateSymbolLabel() {
  var n = _selectedSymbols.size;
  document.getElementById('symbolMsLabel').textContent =
    n === 0 ? 'All symbols' : (n === 1 ? Array.from(_selectedSymbols)[0] : n + ' symbols');
  document.getElementById('symbolMsBtn').classList.toggle('active', n > 0);
}
// Rebuild the checklist only when the symbol set changes and the menu is closed,
// so the 2s poll never disrupts an open menu mid-interaction.
function renderSymbolMenu(symbols) {
  var key = (symbols || []).join(',');
  if (key !== _lastSymbolsKey && !symbolMenuOpen()) {
    _lastSymbolsKey = key;
    var menu = document.getElementById('symbolMsMenu');
    menu.innerHTML =
      '<div class="sig-ms-item all" onclick="clearSymbols()"><span>All symbols</span></div>' +
      '<div class="sig-ms-sep"></div>' +
      (symbols || []).map(function(s){
        return '<label class="sig-ms-item"><input type="checkbox" value="' + s + '"' +
               (_selectedSymbols.has(s) ? ' checked' : '') + ' onchange="onSymbolCheck(this)"><span>' + s + '</span></label>';
      }).join('');
  }
  updateSymbolLabel();
}
function onSymbolCheck(cb) {
  if (cb.checked) _selectedSymbols.add(cb.value); else _selectedSymbols.delete(cb.value);
  updateSymbolLabel();
  clearTimeout(_symApplyTimer);
  _symApplyTimer = setTimeout(applyFilters, 250); // batch rapid multi-checks into one refresh
}
function clearSymbols() {
  _selectedSymbols.clear();
  document.querySelectorAll('#symbolMsMenu input[type=checkbox]').forEach(function(cb){ cb.checked = false; });
  updateSymbolLabel();
  closeSymbolMenu();
  applyFilters();
}

function setStatusFilter(v, btn) {
  _statusFilter = v;
  btn.parentNode.querySelectorAll('[data-status]').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  loadList(); // status is a list-only view filter; the stats are unaffected
}
function setDirFilter(v, btn) {
  _dirFilter = v;
  btn.parentNode.querySelectorAll('[data-dir]').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  applyFilters();
}
function expandAll()   { _rows.forEach(function(r){ _expandedIds.add(r.id); });    renderRows(); }
function collapseAll() { _expandedIds.clear(); renderRows(); }
function toggleExpand(id) {
  if (_expandedIds.has(id)) _expandedIds.delete(id); else _expandedIds.add(id);
  renderRows();
}

function renderForm() {
  var el = document.getElementById('sigForm');
  if (!el) return;
  if (_formRows === null) return; // not fetched yet — leave whatever's there (usually nothing, briefly)
  if (!_formRows.length) { el.innerHTML = '<span class="sig-form-empty">No closed signals yet</span>'; return; }
  el.innerHTML = _formRows.map(function(r) {
    var win = r.outcome === 'TP_HIT';
    var label = r.symbol + ' ' + r.timeframe + ' — ' + (win ? 'win' : 'loss');
    return '<span class="sig-form-dot ' + (win ? 'win' : 'loss') + '" role="img" aria-label="' + label + '" title="' + label + '"></span>';
  }).join('');
}

function loadStats() {
  var mySeq = ++_statsReqSeq; // guard against a stale filtered response clobbering a newer one
  fetch('/signals/api/stats?' + filterParams(false).toString()).then(function(r){ return r.json(); }).then(function(data) {
    if (mySeq !== _statsReqSeq || data.error) return;
    var o = data.overall || {};
    var winClass = (o.win_rate == null) ? '' : (o.win_rate >= 50 ? 'green' : 'red');
    var rrClass  = (o.avg_rr == null) ? '' : (o.avg_rr >= 0 ? 'green' : 'red');
    // In S/R mode the counts come from the backtest: pending / wins / losses.
    var lblActive = _srMode ? 'Pending' : 'Active';
    var lblWin = _srMode ? 'Wins' : 'TP Hits', lblLoss = _srMode ? 'Losses' : 'SL Hits';
    var srResolved = (o.tp_count || 0) + (o.sl_count || 0);
    var srTotal = srResolved + (o.active_count || 0);
    var winSub = _srMode
      ? '<div class="stat-sub" title="Backtested against the 30-min price feed over the trailing ~6 months of signals">L' + _srLevel + ' · ' + srResolved + '/' + srTotal + ' resolved · 6-mo</div>'
      : '';
    document.getElementById('sigStats').innerHTML =
      '<div class="stat-card compact"><div class="label">' + lblActive + '</div><div class="value">' + (o.active_count || 0) + '</div></div>' +
      '<div class="stat-card compact green"><div class="label">' + lblWin + '</div><div class="value">' + (o.tp_count || 0) + '</div></div>' +
      '<div class="stat-card compact red"><div class="label">' + lblLoss + '</div><div class="value">' + (o.sl_count || 0) + '</div></div>' +
      '<div class="stat-card compact ' + winClass + '"><div class="label">Win Rate</div><div class="value">' + (o.win_rate == null ? '—' : o.win_rate + '%') + '</div>' + winSub + '</div>' +
      '<div class="stat-card compact ' + rrClass + '"><div class="label">Avg R:R ' + (_srMode ? 'Backtest' : 'Achieved') + '</div><div class="value">' + (o.avg_rr == null ? '—' : o.avg_rr.toFixed(2) + 'R') + '</div></div>' +
      '<div class="stat-card compact sig-form-card"><div class="label">Recent Form</div><div class="value" id="sigForm"></div></div>';
    renderForm(); // repaint from whatever's cached — decoupled from fetch order below

    // Symbol menu is built from the global (unfiltered) symbol list, so filtering
    // by some symbols never drops the others.
    renderSymbolMenu(data.symbols || []);
  }).catch(function(){});

  // Recent-form strip: recent closed signals matching the current filters
  // (symbol / timeframe / direction / min R:R). Cached in _formRows + repainted
  // via renderForm() so it can resolve in either order without a race.
  var fp = filterParams(false); fp.set('status', 'CLOSED'); fp.set('page_size', '14');
  fetch('/signals/api/list?' + fp.toString()).then(function(r){ return r.json(); }).then(function(data) {
    if (mySeq !== _statsReqSeq) return;
    _formRows = (data.rows || []).slice().reverse(); // API is DESC; reverse to chronological
    renderForm();
  }).catch(function(){});
}

function bracketHtml(r) {
  var L = effLevels(r);
  if (!L) return '<span class="muted" title="no level ' + _srLevel + ' for this signal">—</span>';
  var vals = [L.sl, L.tp];
  var lo = Math.min.apply(null, vals), hi = Math.max.apply(null, vals);
  var pad = (hi - lo) * 0.2 || Math.abs(L.tp) * 0.01 || 1;
  lo -= pad; hi += pad;
  function pos(v) { return (((v - lo) / (hi - lo)) * 100).toFixed(1); }
  var exitDot = '';
  if (L.closePrice != null) {  // EA framing only draws where it actually closed
    var cls = L.outcome === 'TP_HIT' ? 'tp' : (L.outcome === 'SL_HIT' ? 'sl' : '');
    exitDot = '<div class="dot exit ' + cls + '" style="left:' + pos(L.closePrice) + '%"></div>';
  }
  var title = 'Stop ' + fmtNum(L.sl) + '  ·  Target ' + fmtNum(L.tp) +
    (L.closePrice != null ? ('  ·  Exit ' + fmtNum(L.closePrice)) : '');
  return '<div class="bracket" title="' + title + '">' +
    '<div class="track"></div>' +
    '<div class="tick sl" style="left:' + pos(L.sl) + '%"></div>' +
    '<div class="tick tp" style="left:' + pos(L.tp) + '%"></div>' +
    exitDot +
    '</div>';
}

function rsiGaugeHtml(v, showLabel) {
  if (v == null) return '<span class="muted">—</span>';
  var pct = Math.max(0, Math.min(100, v));
  return '<div class="rsi-gauge" title="RSI ' + v.toFixed(1) + '">' +
    '<div class="track"><div class="marker" style="left:' + pct.toFixed(1) + '%"></div></div>' +
    '<div class="val">' + (showLabel ? 'RSI ' : '') + v.toFixed(1) + '</div>' +
  '</div>';
}

function resultBadgeHtml(r) {
  if (_srMode) {
    var oc = r.sr_outcome;
    if (oc === 'WIN')     return '<span class="badge tp">WIN</span>';
    if (oc === 'LOSS')    return '<span class="badge sl">LOSS</span>';
    if (oc === 'PENDING') return '<span class="badge active">PENDING</span>';
    return '<span class="badge">—</span>';
  }
  if (r.status === 'ACTIVE') return '<span class="badge active">ACTIVE</span>';
  if (r.outcome === 'TP_HIT') return '<span class="badge tp">TP HIT</span>';
  if (r.outcome === 'SL_HIT') return '<span class="badge sl">SL HIT</span>';
  return '<span class="badge">CLOSED</span>';
}
function directionBadgeHtml(r) {
  return r.direction === 'BUY' ? '<span class="badge buy">▲ BUY</span>' : '<span class="badge sell">▼ SELL</span>';
}

function detailItem(k, v) {
  return '<div class="sig-detail-item"><div class="k">' + k + '</div><div class="v">' + v + '</div></div>';
}

function rowHtml(r, flashEnabled) {
  var rr = achievedRR(r);
  var rrHtml = rr == null ? '<span class="muted">—</span>' :
    '<span class="sig-rr ' + (rr >= 0 ? 'pos' : 'neg') + '">' + (rr >= 0 ? '+' : '') + rr.toFixed(2) + 'R</span>';
  var stateCls = stateClass(r);
  var isNew = !_seenIds.has(r.id);
  _seenIds.add(r.id);
  var expanded = _expandedIds.has(r.id);
  var detailId = 'sig-detail-' + r.id;

  var main = '<tr class="sig-row ' + stateCls + (isNew && flashEnabled ? ' flash-new' : '') + '">' +
    '<td class="sig-col-x"><button class="sig-expand-btn' + (expanded ? ' open' : '') + '" data-id="' + r.id + '" ' +
      'onclick="toggleExpand(' + r.id + ')" aria-label="Toggle details for signal ' + r.id + '" ' +
      'aria-expanded="' + (expanded ? 'true' : 'false') + '" aria-controls="' + detailId + '">▸</button></td>' +
    '<td class="num muted">' + r.id + '</td>' +
    '<td class="sig-instrument"><span class="sym">' + r.symbol + '</span><span class="tf">' + r.timeframe + '</span></td>' +
    '<td>' + directionBadgeHtml(r) + '</td>' +
    '<td>' + bracketHtml(r) + '</td>' +
    '<td>' + rsiGaugeHtml(r.rsi_value) + '</td>' +
    '<td>' + resultBadgeHtml(r) + '</td>' +
    '<td class="num">' + rrHtml + '</td>' +
    '<td class="muted" title="' + fmtTs(r.signal_time) + '">' + relTime(r.signal_time) + '</td>' +
    '</tr>';

  var desc = signalDescription(r);
  var descHtml = desc ? '<div class="sig-detail-desc">' + desc.html + '</div>' : '';
  var detail = '<tr class="sig-detail-row" id="' + detailId + '" style="' + (expanded ? '' : 'display:none;') + '">' +
    '<td colspan="9">' + descHtml + '<div class="sig-detail-grid">' +
      (function(){
        var L = effLevels(r) || {};
        return detailItem(_srMode ? ('Stop · S/R L1') : 'Stop Loss', fmtNum(L.sl)) +
               detailItem(_srMode ? ('Target · L' + _srLevel) : 'Take Profit', fmtNum(L.tp)) +
               (_srMode ? detailItem('S/R Outcome', r.sr_outcome || '—')
                        : detailItem('Close Price', fmtNum(r.close_price)));
      })() +
      detailItem('Signal Time', fmtTs(r.signal_time)) +
      detailItem('Close Time', fmtTs(r.close_time)) +
      detailItem('Created', fmtTs(r.created_at)) +
      detailItem('Updated', fmtTs(r.updated_at)) +
      detailItem('Resistance 1', fmtNum(r.resistance_1)) +
      detailItem('Resistance 2', fmtNum(r.resistance_2)) +
      detailItem('Resistance 3', fmtNum(r.resistance_3)) +
      detailItem('Support 1', fmtNum(r.support_1)) +
      detailItem('Support 2', fmtNum(r.support_2)) +
      detailItem('Support 3', fmtNum(r.support_3)) +
    '</div></td></tr>';

  return main + detail;
}

function renderRows() {
  var flashEnabled = _hasRenderedOnce;
  var active = document.activeElement;
  var focusedId = (active && active.classList && active.classList.contains('sig-expand-btn'))
    ? active.getAttribute('data-id') : null;

  document.getElementById('sigBody').innerHTML = _rows.length
    ? _rows.map(function(r) { return rowHtml(r, flashEnabled); }).join('')
    : '<tr><td colspan="9" class="empty">No signals match the current filters</td></tr>';
  _hasRenderedOnce = true;

  if (focusedId) {
    var btn = document.querySelector('.sig-expand-btn[data-id="' + focusedId + '"]');
    if (btn) btn.focus();
  }
}

// ── Boxes view: annotated per-signal trade charts ──────────────────────────
var _lastBoxSignature = '';
var _lastAnatomySignature = '';
var _chartCache = {};      // id -> { data, fetchedAt }
var _chartInstances = {};  // id -> { chart, series, observer }
var _chartType = 'candle'; // 'candle' | 'line' — global, applies to every box

var _lwBaseOpts = {
  layout:    { background: { type: 'solid', color: 'transparent' }, textColor: '#5d6b82' },
  grid:      { vertLines: { color: 'rgba(255,255,255,.04)' }, horzLines: { color: 'rgba(255,255,255,.04)' } },
  crosshair: { mode: 1 },
  rightPriceScale: { borderColor: 'rgba(255,255,255,.08)', scaleMargins: { top: 0.06, bottom: 0.06 } },
  timeScale:       { borderColor: 'rgba(255,255,255,.08)', timeVisible: true, secondsVisible: false, rightOffset: 2 },
  handleScroll:    { vertTouchDrag: false },
  handleScale:     { axisPressedMouseMove: { time: true, price: false } },
};

function stateClass(r) {
  if (_srMode) {
    return r.sr_outcome === 'WIN' ? 'st-tp' : (r.sr_outcome === 'LOSS' ? 'st-sl' : (r.sr_outcome === 'PENDING' ? 'st-active' : ''));
  }
  return r.status === 'ACTIVE' ? 'st-active' : (r.outcome === 'TP_HIT' ? 'st-tp' : (r.outcome === 'SL_HIT' ? 'st-sl' : ''));
}

// Shared caption strip for card views — a plain-English read of the setup,
// anchored on the support/resistance levels (never the entry price).
function descCaptionHtml(r) {
  var desc = signalDescription(r);
  return desc ? '<div class="sig-box-desc" title="' + desc.text + '">' + desc.html + '</div>' : '';
}

function boxCardHtml(r) {
  var rr = achievedRR(r);
  var rrHtml = rr == null ? '<span class="muted">—</span>' :
    '<span class="sig-rr ' + (rr >= 0 ? 'pos' : 'neg') + '">' + (rr >= 0 ? '+' : '') + rr.toFixed(2) + 'R</span>';
  return '<div class="sig-box card ' + stateClass(r) + rrCardClass(r) + '" data-id="' + r.id + '">' +
    '<div class="sig-box-head">' +
      '<div class="sig-instrument"><span class="sym">' + r.symbol + '</span><span class="tf">' + r.timeframe + '</span></div>' +
      directionBadgeHtml(r) + resultBadgeHtml(r) +
      '<span class="sig-rr">' + rrHtml + '</span>' +
    '</div>' +
    '<div class="sig-box-chart" id="sig-chart-' + r.id + '"><div class="sig-box-chart-msg">Loading chart…</div></div>' +
    descCaptionHtml(r) +
    '<div class="sig-box-foot">' +
      '<div class="sig-foot-metrics">' + rsiGaugeHtml(r.rsi_value, true) + rrMeterHtml(r) + '</div>' +
      '<span class="muted sig-foot-time" title="' + fmtTs(r.signal_time) + '">' + relTime(r.signal_time) + '</span>' +
    '</div>' +
  '</div>';
}

function renderBoxes() {
  var el = document.getElementById('sigBoxes');
  // Dispose any existing chart instances before rebuilding the grid.
  Object.keys(_chartInstances).forEach(function(id) {
    var inst = _chartInstances[id];
    if (inst.observer) inst.observer.disconnect();
    if (inst.chart) { try { inst.chart.remove(); } catch (e) {} }
  });
  _chartInstances = {};

  el.innerHTML = _rows.length
    ? _rows.map(boxCardHtml).join('')
    : '<div class="empty" style="grid-column:1/-1;">No signals match the current filters</div>';

  // Scope to #sigBoxes so we never attach candle observers to Anatomy cards
  // (both card types share the .sig-box class but live in separate grids).
  document.querySelectorAll('#sigBoxes .sig-box').forEach(function(box) {
    var id = parseInt(box.getAttribute('data-id'), 10);
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) { loadChart(id, false); }
      });
    }, { rootMargin: '150px' });
    observer.observe(box);
    _chartInstances[id] = { observer: observer };
  });
}

// ── Anatomy view: the trade drawn from its own numbers (no price feed) ──────
function anatomyCardHtml(r) {
  var rr = achievedRR(r);
  var rrHtml = rr == null ? '<span class="muted">—</span>' :
    '<span class="sig-rr ' + (rr >= 0 ? 'pos' : 'neg') + '">' + (rr >= 0 ? '+' : '') + rr.toFixed(2) + 'R</span>';
  return '<div class="sig-box card ' + stateClass(r) + rrCardClass(r) + '" data-id="' + r.id + '">' +
    '<div class="sig-box-head">' +
      '<div class="sig-instrument"><span class="sym">' + r.symbol + '</span><span class="tf">' + r.timeframe + '</span></div>' +
      directionBadgeHtml(r) + resultBadgeHtml(r) +
      '<span class="sig-rr">' + rrHtml + '</span>' +
    '</div>' +
    '<div class="sig-box-plot" id="sig-plot-' + r.id + '"></div>' +
    descCaptionHtml(r) +
    '<div class="sig-box-foot">' +
      '<div class="sig-foot-metrics">' + rsiGaugeHtml(r.rsi_value, true) + rrMeterHtml(r) + '</div>' +
      '<span class="muted sig-foot-time" title="' + fmtTs(r.signal_time) + '">' + tradeDurationText(r) + ' · ' + relTime(r.signal_time) + '</span>' +
    '</div>' +
  '</div>';
}

function renderAnatomyBoxes() {
  var el = document.getElementById('sigAnatomy');
  el.innerHTML = _rows.length
    ? _rows.map(anatomyCardHtml).join('')
    : '<div class="empty" style="grid-column:1/-1;">No signals match the current filters</div>';
  // Panels are cheap DOM/SVG (no chart library, no per-card fetch) — draw them
  // all immediately; no IntersectionObserver deferral needed.
  _rows.forEach(function(r) {
    var plot = document.getElementById('sig-plot-' + r.id);
    if (plot) renderAnatomy(r, plot);
  });
}

function renderCurrentView() {
  if (_view === 'table') { renderRows(); return; }
  // Framing key: rebuild the cards when the S/R mode/level/overlay changes.
  var frame = (_srMode ? 'sr' + _srLevel + '+' + Array.from(_srOverlay).sort().join('') : 'ea');
  if (_view === 'anatomy') {
    // Signature includes mutable fields the panel depends on, so a signal
    // repaints when the 2s poll flips it ACTIVE→CLOSED or resolves its backtest.
    var sigA = frame + '|' + _rows.map(function(r){
      return r.id + ':' + r.status + ':' + (r.outcome || '') + ':' + (r.close_price == null ? '' : r.close_price) + ':' + (r.sr_outcome || '');
    }).join(',');
    if (sigA !== _lastAnatomySignature) { _lastAnatomySignature = sigA; renderAnatomyBoxes(); }
    return;
  }
  var sig = frame + '|' + _rows.map(function(r){ return r.id + ':' + (r.sr_outcome || ''); }).sort().join(',');
  if (sig !== _lastBoxSignature) { _lastBoxSignature = sig; renderBoxes(); }
}

function loadChart(id, force) {
  var row = _rows.find(function(r){ return r.id === id; });
  if (!row) return;
  var cached = _chartCache[id];
  var isActive = row.status === 'ACTIVE';
  if (!force && cached && (!isActive || (Date.now() - cached.fetchedAt) < 15000)) {
    renderChart(id, cached.data);
    return;
  }
  fetch('/signals/api/chart/' + id).then(function(r){ return r.json(); }).then(function(data) {
    if (data.error) { showChartMsg(id, data.error); return; }
    _chartCache[id] = { data: data, fetchedAt: Date.now() };
    renderChart(id, data);
  }).catch(function() { showChartMsg(id, 'Failed to load chart'); });
}

function showChartMsg(id, msg) {
  var container = document.getElementById('sig-chart-' + id);
  if (container) container.innerHTML = '<div class="sig-box-chart-msg">' + msg + '</div>';
}

function renderChart(id, data) {
  var container = document.getElementById('sig-chart-' + id);
  if (!container) return;
  if (!data.bars || !data.bars.length) { showChartMsg(id, 'No price history for this window'); return; }
  container.innerHTML = '';
  container.style.position = 'relative';

  var chart = LightweightCharts.createChart(container, Object.assign({}, _lwBaseOpts, { autoSize: true }));

  // The backend buckets at a fixed 1 hour regardless of the signal's own
  // M1/M5/M15/M30 label, since dealio.ticks is a 30-min snapshot feed
  // (verified against production) and anything finer than that degenerates
  // to open==high==low==close. A 1-hour bucket reliably spans 2-3 real
  // snapshots, so these are genuine bars, not synthesized ones — real
  // candlesticks by default, with a line/area option (_chartType, toggled
  // globally in the filter bar) for whichever reads cleaner to the viewer.
  var barTimes = data.bars.map(function(b) { return Math.floor(new Date(b.ts).getTime() / 1000); });
  var series;
  if (_chartType === 'line') {
    var closes = data.bars.map(function(b) { return b.c; });
    var trendUp = closes.length < 2 || closes[closes.length - 1] >= closes[0];
    series = chart.addAreaSeries({
      lineColor: trendUp ? '#34d399' : '#f87171', lineWidth: 2,
      topColor:    trendUp ? 'rgba(52,211,153,.22)' : 'rgba(248,113,113,.18)',
      bottomColor: trendUp ? 'rgba(52,211,153,0)'   : 'rgba(248,113,113,0)',
      crosshairMarkerVisible: true, priceLineVisible: false,
    });
    series.setData(data.bars.map(function(b, i) {
      return { time: barTimes[i], value: b.c };
    }));
  } else {
    series = chart.addCandlestickSeries({
      upColor: '#34d399', downColor: '#f87171',
      borderUpColor: '#34d399', borderDownColor: '#f87171',
      wickUpColor: '#34d399', wickDownColor: '#f87171',
    });
    series.setData(data.bars.map(function(b, i) {
      return { time: barTimes[i], open: b.o, high: b.h, low: b.l, close: b.c };
    }));
  }

  // Arrow markers anchored to actual bars, not just the vertical cutoff line:
  // entry (colored by direction) and, once closed, an orange exit marker.
  // The underlying feed only buckets at 1 hour (see _CHART_BUCKET_SECS), but
  // this EA's trades often resolve in seconds to minutes — far finer than
  // that bucket — so entry and exit routinely land on the *same* bar. Always
  // place them on opposite sides of the bar (never both above or both below)
  // so they never visually stack, and label the exit with the actual elapsed
  // time when they do share a bar, so it reads as "fast trade" rather than
  // a confusing coincidence.
  function closestBarTime(iso) {
    var unix = Math.floor(new Date(iso).getTime() / 1000);
    return barTimes.reduce(function(closest, t) {
      return Math.abs(t - unix) < Math.abs(closest - unix) ? t : closest;
    }, barTimes[0]);
  }
  function fmtDuration(ms) {
    var s = Math.round(ms / 1000);
    if (s < 60) return s + 's';
    var m = Math.round(s / 60);
    if (m < 60) return m + 'm';
    return Math.round(m / 60) + 'h';
  }
  // Entry itself is drawn as a custom flag pointer in paintOverlay() below
  // (a shape + explicit BUY/SELL SIGNAL label the built-in marker shapes
  // can't express) — only the exit uses a native Lightweight Charts marker.
  var entryPosition = data.direction === 'BUY' ? 'belowBar' : 'aboveBar';
  var exitPosition = entryPosition === 'belowBar' ? 'aboveBar' : 'belowBar';
  var entryBarTime = closestBarTime(data.signal_time);
  var markers = [];
  // Exit marker — where the EA's own trade actually closed.
  if (data.close_time) {
    var exitBarTime = closestBarTime(data.close_time);
    var exitText = 'Exit';
    if (exitBarTime === entryBarTime) {
      exitText = 'Exit (' + fmtDuration(new Date(data.close_time).getTime() - new Date(data.signal_time).getTime()) + ')';
    }
    markers.push({
      time: exitBarTime,
      position: exitPosition,
      color: '#fb923c',
      shape: exitPosition === 'belowBar' ? 'arrowUp' : 'arrowDown',
      text: exitText,
    });
  }
  markers.sort(function(a, b) { return a.time - b.time; }); // Lightweight Charts requires markers in ascending time order
  series.setMarkers(markers);

  // By default Lightweight Charts autoscales the price axis to the candle data
  // only — price lines (SL/TP/R/S) don't expand it. A TP far from the current
  // price would then fall off the visible range entirely (and its triangle
  // marker with it), so always force entry/SL/TP into view — they're the core
  // trade parameters and by construction are close to the actual price.
  //
  // Resistance/support are a different story: BuildSRLevels() in the EA scans
  // up to 120 weekly bars back for pivots, so support_2/support_3 in particular
  // can legitimately sit thousands of points away from a trade that's only a
  // few hundred points wide (a real EA signal was seen with entry/SL/TP/R1
  // clustered within ~400 points while support_2/3 sat ~3,100+ points below).
  // Forcing those into view would crush the actual price action into a sliver
  // of the chart — flat-looking candles. Only pull a level into view if it's
  // within 2x the core (entry/SL/TP) span; further-out levels just won't be
  // visible on this zoomed-in trade review (their exact values are still in
  // the card header's tooltip / the table's detail panel).
  // Effective entry/stop/target for the chart under the active framing.
  var _cIsBuy = data.direction === 'BUY';
  var effEntry = data.entry_price, effSl = data.sl_price, effTp = data.tp_price;
  if (_srMode) {
    var _cr = data['resistance_' + _srLevel], _cs = data['support_' + _srLevel];
    if (_cr != null && _cs != null) { effSl = _cIsBuy ? _cs : _cr; effTp = _cIsBuy ? _cr : _cs; }
  }
  var _core = [effEntry, effSl, effTp];
  // In S/R mode only the ticked overlay levels are drawn; EA mode shows them all.
  var _levelKeys = _srMode
    ? [1, 2, 3].filter(function(n){ return _srOverlay.has(n); })
        .reduce(function(a, n){ a.push('resistance_' + n, 'support_' + n); return a; }, [])
    : ['resistance_1', 'resistance_2', 'resistance_3', 'support_1', 'support_2', 'support_3'];
  series.applyOptions({
    autoscaleInfoProvider: function(original) {
      var res = original();
      if (!res || !res.priceRange) return res;
      var min = res.priceRange.minValue, max = res.priceRange.maxValue;
      _core.forEach(function(v) { if (v != null) { min = Math.min(min, v); max = Math.max(max, v); } });
      var coreSpan = Math.max(max - min, 1e-9);
      _levelKeys.forEach(function(k) {
        var v = data[k];
        if (v == null) return;
        var dist = v < min ? (min - v) : (v > max ? (v - max) : 0);
        if (dist <= coreSpan * 2) { min = Math.min(min, v); max = Math.max(max, v); }
      });
      res.priceRange.minValue = min;
      res.priceRange.maxValue = max;
      return res;
    },
  });

  // Stop & target lines are always drawn; entry is intentionally not shown
  // (it's the signal-creation price, not any client's actual entry).
  series.createPriceLine({ price: effSl, color: '#f87171', lineWidth: 1, lineStyle: 0, axisLabelVisible: true, title: _srMode ? 'Stop' : 'SL' });
  series.createPriceLine({ price: effTp, color: '#34d399', lineWidth: 1, lineStyle: 0, axisLabelVisible: true, title: _srMode ? 'Target' : 'TP' });
  [['resistance_1','R1'], ['resistance_2','R2'], ['resistance_3','R3']].forEach(function(p) {
    if (data[p[0]] != null && (!_srMode || _srOverlay.has(parseInt(p[1].slice(1),10)))) series.createPriceLine({ price: data[p[0]], color: 'rgba(251,191,36,.55)', lineWidth: 1, lineStyle: 3, axisLabelVisible: false, title: p[1] });
  });
  [['support_1','S1'], ['support_2','S2'], ['support_3','S3']].forEach(function(p) {
    if (data[p[0]] != null && (!_srMode || _srOverlay.has(parseInt(p[1].slice(1),10)))) series.createPriceLine({ price: data[p[0]], color: 'rgba(91,157,255,.55)', lineWidth: 1, lineStyle: 3, axisLabelVisible: false, title: p[1] });
  });

  var overlay = document.createElement('div');
  overlay.className = 'sig-box-overlay';
  container.appendChild(overlay);

  function paintOverlay() {
    overlay.innerHTML = '';
    var signalUnix = Math.floor(new Date(data.signal_time).getTime() / 1000);
    var x = chart.timeScale().timeToCoordinate(signalUnix);
    if (x != null) {
      // Shade the post-signal region so "history before" vs. "the actual trade
      // after" reads at a glance, not just as a thin line easily mistaken for
      // a chart gridline.
      var shade = document.createElement('div');
      shade.className = 'sig-cutoff-shade';
      shade.style.left = x + 'px';
      overlay.appendChild(shade);
      var label = document.createElement('div');
      label.className = 'sig-cutoff-label';
      label.style.left = x + 'px';
      label.textContent = 'Signal';
      overlay.appendChild(label);
    }
    // Stop/target right-edge triangles.
    [[effSl, 'sl'], [effTp, 'tp']].forEach(function(p) {
      var y = p[0] == null ? null : series.priceToCoordinate(p[0]);
      if (y != null) {
        var tri = document.createElement('div');
        tri.className = 'sig-tri sig-tri-' + p[1];
        tri.style.top = y + 'px';
        overlay.appendChild(tri);
      }
    });
    // Resistance / support banner markers — shown regardless of the toggle (like
    // the S/R price lines): red flag at resistance_1, green flag at support_1.
    [['resistance_1', 'resistance'], ['support_1', 'support']].forEach(function(p) {
      var v = data[p[0]];
      if (v == null) return;
      var y = series.priceToCoordinate(v);
      if (y != null) {
        var f = document.createElement('div');
        f.className = 'sig-lvl-flag ' + p[1];
        f.style.top = y + 'px';
        overlay.appendChild(f);
      }
    });

    // Signal-entry pointer: tip anchored exactly on (entry bar, entry price).
    // Small on purpose — the direction label sits just above/below it as its
    // own compact tag rather than crammed inside the shape. Matches
    // entryPosition (belowBar for BUY, aboveBar for SELL, same convention as
    // the exit marker below and the ▲/▼ table badges): a BUY signal sits
    // below the candle pointing up into it; SELL stays above pointing down.
    // This is the directional signal marker (no price shown) — the entry price
    // itself is deliberately never labelled.
    var entryX = chart.timeScale().timeToCoordinate(entryBarTime);
    var entryY = series.priceToCoordinate(effEntry);
    if (entryX != null && entryY != null) {
      var dirCls = data.direction === 'BUY' ? 'buy' : 'sell';
      var below = entryPosition === 'belowBar';
      var flag = document.createElement('div');
      flag.className = 'sig-signal-flag ' + dirCls + (below ? ' below' : '');
      flag.style.left = entryX + 'px';
      flag.style.top = entryY + 'px';
      overlay.appendChild(flag);

      var label = document.createElement('div');
      label.className = 'sig-signal-label ' + dirCls + (below ? ' below' : '');
      label.style.left = entryX + 'px';
      // Sits just clear of the 16px-tall flag — above it normally, below it
      // when the flag itself is flipped below the candle.
      label.style.top = (below ? entryY + 19 : entryY - 19) + 'px';
      label.textContent = (data.direction === 'BUY' ? 'Buy' : 'Sell') + ' Signal';
      overlay.appendChild(label);
    }
  }
  paintOverlay();
  chart.timeScale().fitContent();
  chart.timeScale().subscribeVisibleTimeRangeChange(paintOverlay);
  chart.subscribeCrosshairMove(function() {}); // keeps the instance interactive

  var prevObserver = _chartInstances[id] && _chartInstances[id].observer;
  _chartInstances[id] = { chart: chart, series: series, observer: prevObserver };
}

// Refresh ACTIVE signals' charts on a slower, independent cadence — no need to
// tie chart repaints to the fast 2s table poll.
setInterval(function() {
  if (_view !== 'boxes') return;
  _rows.forEach(function(r) {
    if (r.status === 'ACTIVE' && _chartInstances[r.id] && _chartInstances[r.id].chart) {
      loadChart(r.id, true);
    }
  });
}, 20000);

function ariaLabel(r) {
  var dec = priceDecimals(r);
  var L = effLevels(r) || { entry:r.entry_price, sl:r.sl_price, tp:r.tp_price };
  var out = L.mode === 'sr'
    ? (r.sr_outcome ? r.sr_outcome.toLowerCase() : 'pending')
    : (r.status === 'ACTIVE' ? 'active' : (r.outcome === 'TP_HIT' ? 'take-profit hit' : (r.outcome === 'SL_HIT' ? 'stop-loss hit' : 'closed')));
  return r.symbol + ' ' + r.timeframe + ' ' + r.direction +
    ' — target ' + L.tp.toFixed(dec) + ', stop ' + L.sl.toFixed(dec) + ', ' + out;
}

// Draws the trade-anatomy panel for one signal into `el` (a .sig-box-plot), as
// a single inline SVG built purely from the signal row — reward/risk zones to
// real price scale (their relative heights ARE the R:R), the entry as the
// accent anchor line, and, once closed, a straight entry→close resolution path
// ending on the level that was hit. No price feed, no charting library.
function renderAnatomy(r, el) {
  function placeholder(msg) {
    el.innerHTML = '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;">' + msg + '</div>';
  }
  var isBuy = r.direction === 'BUY';
  var dec = priceDecimals(r);
  var L = effLevels(r);
  if (!L) { placeholder('No level ' + _srLevel); return; }
  var entry = L.entry, sl = L.sl, tp = L.tp;
  if (entry == null || sl == null || tp == null) { placeholder('No trade levels'); return; }

  // Resolution: EA reads the actual close; S/R reads the backtested outcome —
  // a win resolves at the target, a loss at the stop, pending stays live.
  var win, loss, closeVal;
  if (L.mode === 'sr') {
    win = L.outcome === 'WIN'; loss = L.outcome === 'LOSS';
    closeVal = win ? tp : (loss ? sl : null);
  } else {
    var cclosed = r.status === 'CLOSED' && r.close_price != null;
    win = cclosed && r.outcome === 'TP_HIT'; loss = cclosed && r.outcome === 'SL_HIT';
    closeVal = cclosed ? r.close_price : null;
  }

  // Overlay S/R levels (S/R mode only) — extra guide lines the user ticked.
  var overlays = [];
  if (L.mode === 'sr') {
    _srOverlay.forEach(function(n) {
      var rv = r['resistance_' + n], sv = r['support_' + n];
      if (rv != null) overlays.push({ v: rv, lbl: 'R' + n });
      if (sv != null) overlays.push({ v: sv, lbl: 'S' + n });
    });
  }

  // Price scale spans entry/stop/target (+close), plus any overlay level within
  // 2.5× the core span (further-out ones would crush the trade and are skipped).
  var vals = [entry, sl, tp];
  if (closeVal != null) vals.push(closeVal);
  var lo = Math.min.apply(null, vals), hi = Math.max.apply(null, vals);
  var coreSpan = (hi - lo) || (Math.abs(entry) * 0.01) || 1;
  overlays.forEach(function(o) { if (o.v >= entry - 2.5 * coreSpan && o.v <= entry + 2.5 * coreSpan) { lo = Math.min(lo, o.v); hi = Math.max(hi, o.v); } });
  var range = (hi - lo) || coreSpan;
  var padP = range * 0.18;
  lo -= padP; hi += padP;

  var W = el.clientWidth || 320, H = el.clientHeight || 230;
  var mL = 6, mR = 6, mT = 8, mB = 8;
  var pL = mL, pR = W - mR, pW = pR - pL;
  function Y(price) { return mT + (hi - price) / (hi - lo) * (H - mT - mB); }

  var entryY = Y(entry), tpY = Y(tp), slY = Y(sl);
  var entryX = pL + 5;
  var closeX = pL + pW * 0.88;

  var reward = isBuy ? (tp - entry) : (entry - tp);
  var risk   = isBuy ? (entry - sl) : (sl - entry);
  function fmtDelta(v) { return (v >= 0 ? '+' : '−') + Math.abs(v).toFixed(dec); }

  var p = [];
  // Overlay guide lines first (under everything).
  overlays.forEach(function(o) {
    if (o.v < lo || o.v > hi) return;
    var y = Y(o.v);
    p.push('<line class="sig-plot-ov" x1="' + pL + '" y1="' + y + '" x2="' + pR + '" y2="' + y + '"/>');
    p.push('<text class="sig-plot-ov-lbl" x="' + (pR - 3) + '" y="' + (y - 3) + '" text-anchor="end">' + o.lbl + '</text>');
  });
  // reward / risk zones (entry↔target, entry↔stop) — heights are the real distances
  p.push('<rect class="sig-plot-band-tp" x="' + pL + '" y="' + Math.min(entryY, tpY) + '" width="' + pW + '" height="' + Math.abs(tpY - entryY) + '"/>');
  p.push('<rect class="sig-plot-band-sl" x="' + pL + '" y="' + Math.min(entryY, slY) + '" width="' + pW + '" height="' + Math.abs(slY - entryY) + '"/>');
  p.push('<line class="sig-plot-line-tp" x1="' + pL + '" y1="' + tpY + '" x2="' + pR + '" y2="' + tpY + '"/>');
  p.push('<line class="sig-plot-line-sl" x1="' + pL + '" y1="' + slY + '" x2="' + pR + '" y2="' + slY + '"/>');
  // The reward and risk zones meet at the signal level — drawn as a thin neutral
  // divider (no price shown: entry is the signal-creation price, not any client's
  // actual entry).
  p.push('<line class="sig-plot-line-entry" x1="' + pL + '" y1="' + entryY + '" x2="' + pR + '" y2="' + entryY + '"/>');
  var tpDy = (tpY < entryY) ? 12 : -4;
  var slDy = (slY < entryY) ? 12 : -4;
  var tLbl = L.mode === 'sr' ? 'TGT' : 'TP';
  var sLbl = L.mode === 'sr' ? 'STOP' : 'SL';
  p.push('<text class="sig-plot-label tp" x="' + (pL + 3) + '" y="' + (tpY + tpDy) + '">' + tLbl + ' ' + tp.toFixed(dec) + '</text>');
  p.push('<text class="sig-plot-delta" x="' + (pR - 3) + '" y="' + (tpY + tpDy) + '" text-anchor="end">' + fmtDelta(reward) + '</text>');
  p.push('<text class="sig-plot-label sl" x="' + (pL + 3) + '" y="' + (slY + slDy) + '">' + sLbl + ' ' + sl.toFixed(dec) + '</text>');
  p.push('<text class="sig-plot-delta" x="' + (pR - 3) + '" y="' + (slY + slDy) + '" text-anchor="end">' + fmtDelta(-risk) + '</text>');

  // Resolution path → close/target/stop, with the ✓/✕. Under the entry dot.
  if (closeVal != null) {
    var closeY = Y(closeVal);
    var pcls = win ? 'tp' : (loss ? 'sl' : '');
    p.push('<polyline class="sig-plot-path ' + pcls + '" points="' + entryX + ',' + entryY + ' ' + closeX + ',' + closeY + '"/>');
  }
  p.push('<circle class="sig-plot-entry-dot' + (closeVal == null ? ' live' : '') + '" cx="' + entryX + '" cy="' + entryY + '" r="' + (closeVal == null ? 4.5 : 4) + '"/>');
  if (closeVal != null) {
    var closeY2 = Y(closeVal);
    var glyph = win ? '✓' : (loss ? '✕' : '●');
    var gcol  = win ? 'var(--green)' : (loss ? 'var(--red)' : 'var(--text-2)');
    p.push('<circle cx="' + closeX + '" cy="' + closeY2 + '" r="6.5" fill="' + gcol + '"/>');
    p.push('<text class="sig-plot-glyph" x="' + closeX + '" y="' + (closeY2 + 3.2) + '" text-anchor="middle" font-size="9" font-weight="700" fill="#0b0d12">' + glyph + '</text>');
  }

  el.innerHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="' + ariaLabel(r) + '">' + p.join('') + '</svg>';
}

// Re-render Anatomy panels on resize so each SVG's viewBox tracks its container
// (keeps text crisp and the bands full-width). Boxes candles autosize
// themselves via Lightweight Charts, so only the Anatomy view needs this.
var _anatomyResizeTimer = null;
window.addEventListener('resize', function() {
  if (_view !== 'anatomy') return;
  clearTimeout(_anatomyResizeTimer);
  _anatomyResizeTimer = setTimeout(function() { _lastAnatomySignature = ''; renderCurrentView(); }, 150);
});

function loadList() {
  var mySeq = ++_listReqSeq;
  var params = filterParams(true);
  params.set('page_size', '200');

  fetch('/signals/api/list?' + params.toString()).then(function(r){ return r.json(); }).then(function(data) {
    if (mySeq !== _listReqSeq) return; // a newer request has already superseded this one
    if (data.error) {
      document.getElementById('sigBody').innerHTML = '<tr><td colspan="9" class="empty">' + data.error + '</td></tr>';
      return;
    }
    _rows = data.rows || [];
    document.getElementById('sigCount').textContent = _rows.length + ' of ' + data.total + ' signals';
    renderCurrentView();
  }).catch(function() {
    if (mySeq !== _listReqSeq) return;
    document.getElementById('sigBody').innerHTML = '<tr><td colspan="9" class="empty">Failed to load</td></tr>';
  });
}

function refreshAll() {
  loadStats();
  loadList();
  document.getElementById('sigUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

document.addEventListener('DOMContentLoaded', function() {
  syncSrControls();
  refreshAll();
  // 2s poll — faster than the EA's own 5s signal-check timer, so a new/closed
  // signal shows up here within a couple seconds of being written.
  setInterval(refreshAll, 2000);
});
</script>
{% endblock %}
