<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMT Recon & PSPs{% block title %}{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ───────────────────────────────────────── */
    :root {
      --bg:         #0f1117;
      --surface:    #161920;
      --surface-alt:#1c2030;
      --border:     #252836;
      --accent:     #4f8ef7;
      --green:      #22c55e;
      --red:        #ef4444;
      --yellow:     #f59e0b;
      --text:       #e2e8f0;
      --text-2:     #94a3b8;
      --muted:      #64748b;
      --radius-sm:  8px;
      --radius-md:  12px;
      --sp-1: 8px; --sp-2: 12px; --sp-3: 16px;
      --sp-4: 24px; --sp-5: 32px;
    }

    /* ── Base ────────────────────────────────────────────────── */
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px; line-height: 1.5;
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 var(--sp-4); height: 56px;
      display: flex; align-items: center; gap: var(--sp-3);
    }
    header .logo {
      font-weight: 800; font-size: 15px; letter-spacing: -.02em;
      background: linear-gradient(90deg, #4f8ef7 0%, #a78bfa 60%, #06b6d4 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header .logo .amp { opacity: .55; font-weight: 600; margin: 0 3px; }
    header .logo .psps {
      background: linear-gradient(90deg, #a78bfa, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    nav { display: flex; gap: 4px; margin-left: 8px; }
    nav a {
      color: var(--muted); text-decoration: none;
      padding: 5px 11px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 500;
      transition: color .15s, background .15s;
    }
    nav a:hover { color: var(--text); background: rgba(255,255,255,.05); }
    nav a.active { color: var(--text); background: rgba(255,255,255,.07); }

    /* ── Layout ──────────────────────────────────────────────── */
    main { max-width: 1100px; margin: 0 auto; padding: var(--sp-5) var(--sp-4); }

    /* ── Page header row ─────────────────────────────────────── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .page-title { font-size: 20px; font-weight: 700; letter-spacing: -.02em; }
    .page-sub   { font-size: 14px; color: var(--text-2); margin-left: 4px; }

    /* legacy alias used by recon pages */
    .month-bar { display: flex; align-items: center; gap: var(--sp-2); margin-bottom: var(--sp-4); }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      height: 36px; padding: 0 14px;
      background: var(--surface-alt); border: 1px solid var(--border);
      color: var(--text); font-size: 13px; font-weight: 500;
      border-radius: var(--radius-sm); cursor: pointer;
      text-decoration: none; white-space: nowrap;
      transition: border-color .15s, background .15s;
    }
    .btn:hover { border-color: var(--accent); background: rgba(79,142,247,.06); }
    .btn-primary {
      background: var(--accent); border-color: var(--accent);
      color: #fff; font-weight: 600;
      transition: background .15s, border-color .15s, transform .1s;
    }
    .btn-primary:hover { background: #3d7de8; border-color: #3d7de8; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-danger {
      background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.2); color: var(--red);
    }
    .btn-danger:hover { background: rgba(239,68,68,.18); border-color: var(--red); }
    /* bare global button/select reset — only for elements outside .btn */
    select {
      background: var(--surface-alt); border: 1px solid var(--border);
      color: var(--text); padding: 0 12px; height: 36px;
      border-radius: var(--radius-sm); font-size: 13px; cursor: pointer;
      transition: border-color .15s;
    }
    select:hover { border-color: var(--accent); }

    /* ── Cards & surface ─────────────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--sp-2); margin-bottom: var(--sp-4);
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 16px 20px;
    }
    .stat-card .label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin-bottom: 6px;
    }
    .stat-card .value { font-size: 24px; font-weight: 700; }
    .stat-card.green .value { color: var(--green); }
    .stat-card.red   .value { color: var(--red);   }
    .stat-card.yellow .value { color: var(--yellow); }

    /* ── Tables ──────────────────────────────────────────────── */
    .table-wrap {
      overflow-x: auto; border-radius: 14px;
      border: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface); padding: 10px 16px;
      text-align: left; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr { cursor: default; transition: background .15s ease; }
    tbody tr.clickable { cursor: pointer; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody tr:nth-child(even) { background: rgba(255,255,255,.012); }
    tbody tr:nth-child(even):hover { background: rgba(255,255,255,.03); }
    td { padding: 14px 16px; white-space: nowrap; font-size: 13px; }
    td:last-child { text-align: right; padding-right: 20px; }

    /* ── Badges ──────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center;
      height: 22px; padding: 0 8px;
      border-radius: 999px; font-size: 11px; font-weight: 600;
    }
    .badge.matched    { background: rgba(34,197,94,.12);  color: var(--green);  }
    .badge.discrepancy{ background: rgba(239,68,68,.12);  color: var(--red);    }
    .badge.mt4_only   { background: rgba(245,158,11,.12); color: var(--yellow); }
    .badge.crm_only   { background: rgba(79,142,247,.12); color: var(--accent); }
    .badge.fee-settlement   { background:rgba(6,182,212,.15);   color:#06b6d4; }
    .badge.fee-chargeback   { background:rgba(251,146,60,.15);  color:#fb923c; }
    .badge.fee-refund       { background:rgba(167,139,250,.15); color:#a78bfa; }
    .badge.fee-rolling      { background:rgba(250,204,21,.15);  color:#facc15; }
    .badge.fee-holdback     { background:rgba(249,115,22,.15);  color:#f97316; }
    .badge.fee-setup        { background:rgba(99,102,241,.15);  color:#6366f1; }
    .badge.fee-registration { background:rgba(99,102,241,.15);  color:#6366f1; }
    .badge.fee-minmonthly   { background:rgba(148,163,184,.15); color:#94a3b8; }

    /* ── Filter pills ────────────────────────────────────────── */
    .filter-bar { display: flex; gap: 6px; margin-bottom: var(--sp-3); flex-wrap: wrap; }
    .filter-btn {
      display: inline-flex; align-items: center; height: 30px; padding: 0 12px;
      border-radius: 999px; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-size: 12px; font-weight: 500; cursor: pointer; text-decoration: none;
      transition: border-color .15s, color .15s;
    }
    .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }

    /* ── Utility ─────────────────────────────────────────────── */
    .num   { text-align: right; font-variant-numeric: tabular-nums; }
    .pos   { color: var(--green); }
    .neg   { color: var(--red);   }
    .muted { color: var(--muted); }
    .fw    { font-weight: 600; }
    .empty { text-align: center; padding: 64px; color: var(--muted); }
    h3     { font-size: 15px; font-weight: 600; }

    .login-link { color: var(--accent); text-decoration: none; font-family: monospace; }
    .login-link:hover { text-decoration: underline; }

    /* recon-specific column tints */
    .th-cash    { border-top: 2px solid rgba(34,197,94,.35); }
    .th-noncash { border-top: 2px solid rgba(245,158,11,.25); }
    .cash-col   { background: rgba(34,197,94,.03); }
    .noncash-col{ background: rgba(245,158,11,.03); color: var(--muted); }
    .methods    { color: var(--muted); max-width: 240px; font-size: 12px; white-space: normal; line-height: 1.4; }
    .legend     { font-size: 12px; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .legend-item{ display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .legend-item.cash    { background: rgba(34,197,94,.15);  color: var(--green); }
    .legend-item.noncash { background: rgba(245,158,11,.15); color: var(--yellow); }

    /* ── Section title ───────────────────────────────────────── */
    .section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted);
      margin: var(--sp-5) 0 var(--sp-2); padding-bottom: var(--sp-2);
      border-bottom: 1px solid var(--border);
    }

    /* ── Form wrapper — centers header + card together ──────────── */
    .form-wrapper { max-width: 840px; margin: 0 auto; width: 100%; }

    @keyframes formEnter {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fee-form { animation: formEnter .2s ease-out both; }

    /* ── Back link ──────────────────────────────────────────────── */
    .back-link {
      font-size: 12px; color: var(--muted); text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
      margin-bottom: 6px; transition: color .15s;
    }
    .back-link:hover { color: var(--text); }

    /* ── Fee forms ───────────────────────────────────────────── */
    .fee-form {
      background: linear-gradient(160deg, var(--surface) 0%, rgba(22,26,40,.95) 100%);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--radius-md); padding: 28px 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .form-row {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 24px; margin-bottom: var(--sp-3);
    }
    .form-row.cols-1 { grid-template-columns: 1fr; }
    .form-row.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .fee-form label {
      display: flex; flex-direction: column; gap: 6px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
    }
    .fee-form input, .fee-form select, .fee-form textarea {
      height: 40px; padding: 0 12px;
      background: rgba(0,0,0,.25); border: 1px solid rgba(255,255,255,.07);
      color: var(--text); border-radius: var(--radius-sm);
      font-size: 13px; width: 100%;
      transition: border-color .15s;
    }
    .fee-form input:hover, .fee-form select:hover, .fee-form textarea:hover {
      border-color: rgba(255,255,255,.14);
    }
    .fee-form input[type=date] { color-scheme: dark; }
    .fee-form option { background: var(--surface-alt); color: var(--text); }
    .fee-form textarea { height: auto; min-height: 72px; padding: 10px 12px; resize: vertical; }
    .fee-form input:focus, .fee-form select:focus, .fee-form textarea:focus {
      border-color: var(--accent); outline: none;
      box-shadow: 0 0 0 3px rgba(79,142,247,.1);
    }
    .fee-form input::placeholder, .fee-form textarea::placeholder { color: var(--muted); }
    .check-row {
      display: flex; align-items: center; gap: 10px;
      height: 40px; color: var(--text); font-size: 13px;
      font-weight: 400; text-transform: none; letter-spacing: 0;
    }
    .check-row input[type=checkbox] {
      width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0;
    }
    .fee-fields { margin-top: 4px; }
    .form-section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: #9ca3af;
      margin-bottom: 14px; margin-top: 4px;
    }
    .form-section-divider {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: #9ca3af;
      border-top: 1px solid rgba(255,255,255,.06);
      padding-top: 20px; margin-top: 24px; margin-bottom: 14px;
    }
    .check-card {
      display: flex; align-items: flex-start; gap: 12px;
      background: transparent; border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--radius-sm); padding: 14px;
      cursor: pointer; transition: border-color .15s;
      text-transform: none; letter-spacing: 0; font-weight: 400;
    }
    .check-card:hover { border-color: rgba(79,142,247,.4); }
    .check-card input[type=checkbox] {
      width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;
      flex-shrink: 0; margin-top: 1px;
    }
    .check-card-label { font-size: 13px; color: var(--text); font-weight: 500; }
    .check-card-hint  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .fee-form .actions { display: flex; gap: 8px; margin-top: var(--sp-3); }
    .form-footer {
      display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
      padding-top: 16px; margin-top: 32px; border-top: 1px solid var(--border);
    }
    .form-footer-actions { display: flex; gap: 8px; }
    .form-hint { font-size: 12px; color: var(--muted); }
    .form-hint kbd {
      font-family: inherit; font-size: 11px;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      border-radius: 4px; padding: 1px 5px;
    }
    .btn-cancel { color: var(--text-2); border-color: var(--border); background: transparent; }
    .btn-cancel:hover { color: var(--text); background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.15); }

    /* ── Tier table ──────────────────────────────────────────── */
    .tier-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .tier-table th { font-size: 11px; font-weight: 700; text-transform: uppercase;
                     letter-spacing: .05em; color: var(--muted); text-align: left; padding: 6px 8px; }
    .tier-table td { padding: 4px 8px; }
    .tier-table input { width: 100%; height: 34px; padding: 0 8px;
                        background: var(--bg); border: 1px solid var(--border);
                        color: var(--text); border-radius: var(--radius-sm); font-size: 13px; }
    .tier-remove { color: var(--muted); background: none; border: none; cursor: pointer;
                   font-size: 16px; padding: 2px 6px; opacity: 0; transition: opacity .15s, color .15s; }
    tr:hover .tier-remove { opacity: 1; }
    .tier-remove:hover { color: var(--red); }
    .btn-rule-edit {
      color: var(--muted); background: none; border: none; cursor: pointer;
      font-size: 13px; padding: 2px 6px; opacity: 0; transition: opacity .15s, color .15s;
    }
    tr:hover .btn-rule-edit { opacity: 1; }
    .btn-rule-edit:hover { color: var(--accent); }
    .edit-rule-banner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; margin-bottom: 12px;
      background: rgba(79,142,247,.08); border: 1px solid rgba(79,142,247,.2);
      border-radius: var(--radius-sm); font-size: 13px; color: var(--accent);
    }
    .rule-value { font-family: monospace; font-weight: 600; font-size: 13px; }

    /* ── Table meta ─────────────────────────────────────────── */
    .table-meta { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

    /* ── Ghost button (primary row action) ───────────────────── */
    .btn-ghost { background: transparent; border-color: transparent; color: var(--accent); font-weight: 600; }
    .btn-ghost:hover { background: rgba(79,142,247,.08); border-color: transparent; }

    /* ── Subtle danger (row-level, fades in on hover) ────────── */
    .btn-danger-sm {
      background: transparent; border-color: transparent; color: var(--muted); opacity: 0;
      transition: opacity .15s, color .15s, background .15s;
    }
    tr:hover .btn-danger-sm { opacity: 1; }
    .btn-danger-sm:hover { color: var(--red); background: rgba(239,68,68,.08); border-color: transparent; }

    /* ── PSP Detail two-column layout ───────────────────────── */
    .detail-layout {
      display: grid; grid-template-columns: 300px 1fr;
      gap: var(--sp-5); align-items: start;
    }
    .detail-sidebar { position: sticky; top: 24px; }

    /* ── PSP identity card ───────────────────────────────────── */
    .psp-card {
      background: linear-gradient(160deg, var(--surface) 0%, rgba(22,26,40,.95) 100%);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--radius-md); box-shadow: 0 8px 24px rgba(0,0,0,.3);
      overflow: hidden;
    }
    .psp-card-header { padding: 20px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.06); }
    .psp-card-name { font-size: 18px; font-weight: 700; letter-spacing: -.02em; color: var(--text); margin-bottom: 4px; }
    .psp-card-sub  { font-size: 12px; color: var(--muted); }
    .psp-card-body { padding: 16px 20px; }
    .psp-meta-item { margin-bottom: 14px; }
    .psp-meta-item:last-child { margin-bottom: 0; }
    .psp-meta-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted); margin-bottom: 3px;
    }
    .psp-meta-value { font-size: 13px; color: var(--text); font-weight: 500; }
    .psp-meta-value.muted { color: var(--text-2); font-weight: 400; }
    .psp-card-actions {
      padding: 14px 16px; border-top: 1px solid rgba(255,255,255,.06);
      display: flex; flex-direction: column; gap: 8px;
    }
    .psp-card-actions .btn { width: 100%; justify-content: center; }

    /* ── Rules section header ────────────────────────────────── */
    .rules-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: var(--sp-2);
    }
    .rules-header .section-title { margin: 0; border: none; padding: 0; }
    .rules-count {
      display: inline-flex; align-items: center; height: 22px; padding: 0 9px;
      background: rgba(79,142,247,.12); color: var(--accent);
      border-radius: 999px; font-size: 11px; font-weight: 700;
    }

    /* ── Entity panel — acts as combined input container ────── */
    .entity-panel {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
      padding: 10px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 14px; transition: border-color .15s;
    }
    .entity-panel:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,.12);
    }
    .entity-panel input {
      flex: 1; min-width: 160px; height: 30px;
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 13px; padding: 0 4px;
    }
    .entity-panel input::placeholder { color: var(--muted); }

    /* ── Entity chips ────────────────────────────────────────── */
    .entity-chip {
      display: inline-flex; align-items: center; gap: 6px; height: 30px;
      background: var(--surface-alt); border: 1px solid var(--border);
      border-radius: 999px; padding: 0 10px 0 12px;
      font-size: 12px; font-weight: 500;
    }
    .entity-chip { transition: background .15s, border-color .15s; }
    .entity-chip:hover { background: rgba(255,255,255,.06); border-color: var(--accent); }
    .entity-chip button {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 15px; padding: 0; line-height: 1; transition: color .15s;
    }
    .entity-chip button:hover { color: var(--red); }
  </style>
</head>
<body>
  <header>
    <div class="logo">CMT Reconciliation<span class="amp">&amp;</span><span class="psps">PSPs</span></div>
    <nav>
      <a href="/" class="{{ 'active' if request.path == '/' or request.path.startswith('/recon') }}">Dashboard</a>
      <a href="/fees" class="{{ 'active' if request.path.startswith('/fees') }}">Fees</a>
      <a href="/fx"   class="{{ 'active' if request.path.startswith('/fx') }}">FX Rates</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
