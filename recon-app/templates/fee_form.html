{% extends "base.html" %}
{% block title %} — {{ 'Edit Agreement' if agreement else 'New PSP Agreement' }}{% endblock %}
{% block content %}

<div style="margin-bottom: var(--sp-2);">
  <a class="btn" href="/fees" style="height:30px;font-size:12px;padding:0 10px;">← Fees</a>
</div>
<div style="margin-bottom: var(--sp-4);">
  <div class="page-title">{{ 'Edit Agreement' if agreement else 'New PSP Agreement' }}</div>
</div>

<form class="fee-form" method="POST"
      action="{{ '/fees/' ~ agreement.id ~ '/edit' if agreement else '/fees/new' }}"
      style="max-width: 760px;">

  <div class="form-row">
    <label>PSP Name *
      <input type="text" name="psp_name" required autofocus
             value="{{ agreement.psp_name if agreement else '' }}"
             placeholder="e.g. NUVEI">
    </label>
    <label>Provider Company Name
      <input type="text" name="provider_name"
             value="{{ agreement.provider_name if agreement else '' }}"
             placeholder="e.g. NUVEI LIMITED">
    </label>
  </div>

  <div class="form-row">
    <label>Agreement Entity
      <select name="agreement_entity">
        <option value="">— None —</option>
        {% for e in entities %}
        <option value="{{ e }}" {{ 'selected' if agreement and agreement.agreement_entity == e }}>{{ e }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Settlement Bank
      <input type="text" name="settlement_bank"
             value="{{ agreement.settlement_bank if agreement else '' }}"
             placeholder="e.g. Absa 242586-USD-1046-11">
    </label>
  </div>

  <div class="form-row">
    <label>Agreement Date
      <input type="date" name="agreement_date"
             value="{{ agreement.agreement_date if agreement else '' }}">
    </label>
    <label>Addendum Date
      <input type="date" name="addendum_date"
             value="{{ agreement.addendum_date if agreement else '' }}">
    </label>
  </div>

  <div class="form-row cols-1" style="margin-bottom: var(--sp-4);">
    <label class="check-row" style="text-transform:none;letter-spacing:0;font-size:13px;font-weight:400;">
      <input type="checkbox" name="auto_settlement"
             {{ 'checked' if agreement and agreement.auto_settlement }}>
      Enable Auto Settlement
    </label>
  </div>

  <div style="display:flex;gap:8px;padding-top:4px;border-top:1px solid var(--border);">
    <button type="submit" class="btn btn-primary">
      {{ 'Save Changes' if agreement else 'Create PSP' }}
    </button>
    <a class="btn" href="/fees">Cancel</a>
  </div>

</form>

{% endblock %}
