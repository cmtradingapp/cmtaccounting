# Stand-alone compose file for the cro-bridge service.
# Joins the recon-app network so it can POST to http://recon:5050/cro/feed.
services:
  cro-bridge:
    build: .
    restart: always
    stop_grace_period: 30s
    # Pull shared creds (MT5_PASSWORD, CRO_BRIDGE_SECRET, MT5_LOGIN, MT5_SERVER)
    # from the recon-app env file so one source of truth handles both stacks.
    env_file:
      - /root/recon-app/.env
    environment:
      # Overrides / defaults (env_file wins if the same key exists there)
      CRO_FEED_URL: http://recon:5050/cro/feed
      CRO_INTERVAL: "30"
      CRO_GROUP: CMV*
      CRO_SOURCE: AN100
      # Force Wine to use native dotnet48 DLLs (not its builtin stubs) so the
      # .NET Framework 4.8 runtime loads the MT5 Manager assemblies correctly.
      WINEDLLOVERRIDES: "mscoree=n,b;fusion=n,b"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/last_push && test $(($(date +%s) - $(stat -c %Y /tmp/last_push))) -lt 180"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - recon_net

networks:
  recon_net:
    external: true
    name: recon-app_recon_net
